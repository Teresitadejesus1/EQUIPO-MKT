    </div>`;

  if(!exps.length){h+=`<div class="empty"><div class="empty-icon">💸</div><p>Sin gastos registrados. Usa el botón de arriba.</p></div>`;}
  else{
    // filter controls
    h+=`<div class="exp-filter-row">
      <input id="exp-search" placeholder="🔍 Buscar…" oninput="rPre()" style="flex:1;min-width:120px"/>
      <select id="exp-farea" onchange="rPre()"><option value="">Todas las áreas</option>${D.areas.map(a=>`<option>${esc(a)}</option>`).join('')}</select>
      <select id="exp-fcat" onchange="rPre()"><option value="">Todas las categorías</option>${EXP_CATS.map(c=>`<option>${c}</option>`).join('')}</select>
      <select id="exp-frec" onchange="rPre()"><option value="">Todos los tipos</option><option value="puntual">📌 Puntuales</option><option value="mensual">🔁 Mensuales</option><option value="trimestral">📅 Trimestrales</option><option value="anual">🗓 Anuales</option></select>
    </div>`;
    const search=(document.getElementById('exp-search')?.value||'').toLowerCase();
    const farea=document.getElementById('exp-farea')?.value||'';
    const fcat=document.getElementById('exp-fcat')?.value||'';
    const frec=document.getElementById('exp-frec')?.value||'';

    const REC_LABEL={puntual:'📌 Puntual',mensual:'🔁 Mensual',trimestral:'📅 Trimestral',anual:'🗓 Anual'};
    const REC_STYLE={puntual:'background:#f1f5f9;color:#475569',mensual:'background:#e0f2fe;color:#0369a1',trimestral:'background:#fef3c7;color:#92400e',anual:'background:#f0fdf4;color:#166534'};

    function expRow(e){
      const pr=D.projects.find(p=>p.id===e.projectId);
      const rec=e.recurrence||'puntual';
      const ds=e.date?new Date(e.date+'T12:00').toLocaleDateString('es-CL',{day:'numeric',month:'short',year:'2-digit'}):(rec!=='puntual'?'Desde inicio':'—');
      const contrib=expTotalContrib(e,curYear,curMonth);
      return`<tr>
        <td style="color:var(--muted);white-space:nowrap;font-size:11px">${ds}</td>
        <td>
          <strong style="font-size:12px">${esc(e.name)}</strong>
          <span style="margin-left:5px;padding:1px 7px;border-radius:8px;font-size:9px;font-weight:700;${REC_STYLE[rec]||REC_STYLE.puntual}">${REC_LABEL[rec]||rec}</span>
          ${e.notes?`<div style="font-size:10px;color:var(--muted);font-style:italic">${esc(e.notes)}</div>`:''}
        </td>
        <td>${e.area?`<span class="tag tag-area" style="font-size:10px">${esc(e.area)}</span>`:'<span style="color:var(--muted)">—</span>'}</td>
        <td style="font-size:11px;color:var(--muted)">${esc(e.category||'—')}</td>
        <td>${pr?`<span class="tag tag-proj" style="font-size:10px">${esc(pr.name)}</span>`:'<span style="color:var(--muted)">—</span>'}</td>
        <td class="exp-amount" style="text-align:right;font-variant-numeric:tabular-nums">
          ${fmt$(e.amount)}
          ${rec!=='puntual'?`<div style="font-size:9px;color:var(--muted);font-weight:400">${fmt$(contrib)} acum.</div>`:''}
        </td>
        <td><div class="exp-actions"><button class="iBtn" onclick="openEditExp('${e.id}')" title="Editar">✏️</button><button class="iBtn" onclick="delExp('${e.id}')" title="Eliminar">🗑</button></div></td>
      </tr>`;
    }

    const filterFn=e=>(!search||(e.name||'').toLowerCase().includes(search)||((e.notes||'').toLowerCase().includes(search)))
      &&(!farea||e.area===farea)&&(!fcat||e.category===fcat)&&(!frec||e.recurrence===frec);

    // Gastos fijos section
    const fixedExps=exps.filter(e=>e.recurrence&&e.recurrence!=='puntual'&&filterFn(e));
    const puntualExps=[...exps].filter(e=>(!e.recurrence||e.recurrence==='puntual')&&filterFn(e)).sort((a,b2)=>(b2.date||'').localeCompare(a.date||''));

    if(fixedExps.length){
      h+=`<div style="font-size:10px;font-weight:800;color:#0369a1;letter-spacing:.5px;text-transform:uppercase;margin:8px 0 5px">🔁 Gastos fijos / recurrentes</div>`;
      h+=`<table class="exp-table" style="margin-bottom:12px"><thead><tr><th>Desde</th><th>Descripción</th><th>Área</th><th>Categoría</th><th>Proyecto</th><th style="text-align:right">Por período / Acum.</th><th></th></tr></thead><tbody>`;
      fixedExps.forEach(e=>{h+=expRow(e);});
      h+=`</tbody></table>`;
    }

    if(puntualExps.length){
      if(fixedExps.length) h+=`<div style="font-size:10px;font-weight:800;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin:8px 0 5px">📌 Gastos puntuales</div>`;
      const filtTotal=puntualExps.reduce((s,e)=>s+Number(e.amount||0),0);
      h+=`<div style="display:flex;justify-content:flex-end;font-size:11px;font-weight:700;color:var(--pre);margin-bottom:6px">${puntualExps.length} registros · Total: ${fmt$(filtTotal)}</div>`;
      h+=`<table class="exp-table"><thead><tr><th>Fecha</th><th>Descripción</th><th>Área</th><th>Categoría</th><th>Proyecto</th><th style="text-align:right">Monto</th><th></th></tr></thead><tbody>`;
      puntualExps.forEach(e=>{h+=expRow(e);});
      h+=`</tbody></table>`;
    }

    if(!fixedExps.length&&!puntualExps.length) h+=`<div style="text-align:center;color:var(--muted);padding:16px">Sin resultados para estos filtros.</div>`;
  }
  h+=`</div>`; // close pre-section
  document.getElementById('v-pre').innerHTML=h;
  const ed=document.getElementById('ed');if(ed)ed.value=new Date().toISOString().split('T')[0];
}

// ─── GANTT ──────────────────────────────────────────────────────────────────
function rGan(){
  const el=document.getElementById('v-gan');
  const tw=D.tasks.filter(t=>t.deadline);
  const today=new Date();today.setHours(0,0,0,0);
  const startMonth=new Date(today.getFullYear(),today.getMonth()+ganttOffset,1);
  const numMonths=ganttZoom; // 1, 2, 3, or 4 months
  const endMonth=new Date(startMonth.getFullYear(),startMonth.getMonth()+numMonths,0);

  let h=`<div style="display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap">
    <button class="btn btn-ghost btn-sm" onclick="ganttOffset--;render()">← Anterior</button>
    <strong style="font-size:13px">${MONTHS_SHORT[startMonth.getMonth()]} ${startMonth.getFullYear()}${numMonths>1?' — '+MONTHS_SHORT[endMonth.getMonth()]+' '+endMonth.getFullYear():''}</strong>
    <button class="btn btn-ghost btn-sm" onclick="ganttOffset++;render()">Siguiente →</button>
    <button class="btn btn-ghost btn-sm" onclick="ganttOffset=0;render()">Hoy</button>
    <div class="fsep"></div>
    <div class="view-toggle">
      <button class="view-btn${ganttZoom===1?' active':''}" onclick="ganttZoom=1;render()">1 mes</button>
      <button class="view-btn${ganttZoom===2?' active':''}" onclick="ganttZoom=2;render()">2 meses</button>
      <button class="view-btn${ganttZoom===3?' active':''}" onclick="ganttZoom=3;render()">3 meses</button>
      <button class="view-btn${ganttZoom===4?' active':''}" onclick="ganttZoom=4;render()">4 meses</button>
    </div>
    <div class="fsep"></div>
    <select class="fsel" onchange="ganttGroupBy=this.value;render()">
      <option value="project" ${ganttGroupBy==='project'?'selected':''}>Por proyecto</option>
      <option value="area" ${ganttGroupBy==='area'?'selected':''}>Por área</option>
      <option value="urgency" ${ganttGroupBy==='urgency'?'selected':''}>Por urgencia</option>
    </select>
  </div>`;

  if(!tw.length){el.innerHTML=h+`<div class="gantt-empty">Sin tareas con fecha límite. Agrega fechas a tus tareas.</div>`;return;}

  const days=[];let dd=new Date(startMonth);
  while(dd<=endMonth){days.push(new Date(dd));dd=new Date(dd.getFullYear(),dd.getMonth(),dd.getDate()+1);}
  // Wider day columns when zoomed in
  const DAY_W=ganttZoom===1?Math.max(28,Math.floor(900/days.length)):ganttZoom===2?Math.max(22,Math.floor(900/days.length)):Math.max(18,Math.floor(860/days.length));

  const monthSpans=[];let cm=null,cc=0,cs=0;
  days.forEach((day,i)=>{const mk=day.getMonth()+'-'+day.getFullYear();if(mk!==cm){if(cm!==null)monthSpans.push({label:MONTHS_ES[days[cs].getMonth()]+' '+days[cs].getFullYear(),count:cc,start:cs});cm=mk;cs=i;cc=0;}cc++;});
  if(cm!==null)monthSpans.push({label:MONTHS_ES[days[cs].getMonth()]+' '+days[cs].getFullYear(),count:cc,start:cs});

  const AREA_COLORS_MAP={};D.areas.forEach((a,i)=>{AREA_COLORS_MAP[a]=AREA_DEF_COLORS[i%AREA_DEF_COLORS.length];});
  let groups=[];
  if(ganttGroupBy==='project'){D.projects.forEach(pr=>{const tks=D.tasks.filter(t=>t.projectId===pr.id&&t.deadline);if(tks.length)groups.push({label:pr.name,color:pr.color,tasks:tks});});const orphan=D.tasks.filter(t=>t.deadline&&!D.projects.find(p=>p.id===t.projectId));if(orphan.length)groups.push({label:'Sin proyecto',color:'#9ea8b8',tasks:orphan});}
  else if(ganttGroupBy==='area'){D.areas.forEach(a=>{const tks=D.tasks.filter(t=>t.area===a&&t.deadline);if(tks.length)groups.push({label:a,color:AREA_COLORS_MAP[a]||'#4361ee',tasks:tks});});const noArea=D.tasks.filter(t=>!t.area&&t.deadline);if(noArea.length)groups.push({label:'Sin área',color:'#9ea8b8',tasks:noArea});}
  else{[['Alta','#e63946'],['Media','#e07b39'],['Baja','#2a9d8f']].forEach(([u,c])=>{const tks=D.tasks.filter(t=>t.urgencia===u&&t.deadline);if(tks.length)groups.push({label:u,color:c,tasks:tks});});}

  const totalW=days.length*DAY_W+180;
  h+=`<div class="gantt-container"><div style="overflow-x:auto"><table class="gantt-table" style="width:${totalW}px"><thead><tr>`;
  h+=`<th class="g-label-col"><div class="g-label-head">Tarea</div></th>`;
  monthSpans.forEach(ms=>{h+=`<th colspan="${ms.count}" class="g-month-head" style="width:${ms.count*DAY_W}px">${ms.label}</th>`;});
  h+=`</tr><tr><th class="g-label-col"><div class="g-label-head" style="font-size:9px">Proyecto / Tarea</div></th>`;
  days.forEach(day=>{const it=day.toDateString()===today.toDateString(),iw=day.getDay()===0||day.getDay()===6;h+=`<th style="width:${DAY_W}px;padding:3px 0;background:${it?'#e8ecff':iw?'#fafafa':'var(--bg)'};border-bottom:1px solid var(--border);border-right:1px solid var(--border);text-align:center;font-size:9px;color:${it?'var(--accent)':'var(--muted)'};font-weight:${it?'800':'400'}">${day.getDate()}</th>`;});
  h+=`</tr></thead><tbody>`;

  groups.forEach(g=>{
    h+=`<tr class="g-proj-row"><td class="g-label-col" style="padding:6px 10px"><div style="display:flex;align-items:center;gap:6px"><div style="width:10px;height:10px;border-radius:50%;background:${g.color};flex-shrink:0"></div><div class="g-proj-name" style="color:${g.color}">${esc(g.label)}</div><span style="font-size:9px;color:var(--muted);font-weight:400">(${g.tasks.length})</span></div></td>`;
    days.forEach(day=>{const it=day.toDateString()===today.toDateString(),iw=day.getDay()===0||day.getDay()===6;h+=`<td style="background:${it?'#e8ecff':iw?'#f5f5f7':'#f7f8fc'};border-bottom:1px solid var(--border);border-right:1px solid var(--border);height:30px"></td>`;});
    h+=`</tr>`;
    g.tasks.forEach(t=>{
      const pr=D.projects.find(p=>p.id===t.projectId);
      const bc=ganttGroupBy==='project'?g.color:(ganttGroupBy==='area'?g.color:({'Alta':'#e63946','Media':'#e07b39','Baja':'#2a9d8f'}[t.urgencia]||'#4361ee'));
      const startD=t.startDate?new Date(t.startDate+'T12:00'):new Date(new Date(t.deadline+'T12:00').getTime()-7*86400000);
      const endD=new Date(t.deadline+'T12:00');
      let bsi=-1,bei=-1;days.forEach((day,i)=>{if(day>=startD&&day<=endD){if(bsi<0)bsi=i;bei=i;}});
      h+=`<tr><td class="g-label-col"><div class="g-label-cell"><div class="g-task-label" title="${esc(t.name)}">${esc(t.name)}</div><div class="g-proj-label">${ganttGroupBy!=='project'&&pr?esc(pr.name):''}</div></div></td>`;
      days.forEach((day,i)=>{const it=day.toDateString()===today.toDateString(),iw=day.getDay()===0||day.getDay()===6,inB=i>=bsi&&i<=bei&&bsi>=0;let cc2='',cs2=`background:${it?'#e8ecff':iw?'#fafafa':'var(--surface)'};border-bottom:1px solid var(--border);border-right:1px solid var(--border);position:relative;`;if(inB){const fi=i===bsi,li=i===bei,done=t.estado==='Completado',r=`border-radius:${fi?'5px':0} ${li?'5px':0} ${li?'5px':0} ${fi?'5px':0}`;cc2=`<div style="position:absolute;top:50%;left:${fi?2:0}px;right:${li?2:0}px;height:20px;transform:translateY(-50%);background:${bc};opacity:${done?0.35:0.88};${r};box-shadow:0 1px 3px rgba(0,0,0,.15)"></div>`;if(fi)cc2+=`<div style="position:absolute;top:50%;left:7px;right:${li?8:2}px;transform:translateY(-50%);font-size:10px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;z-index:2;text-shadow:0 1px 2px rgba(0,0,0,.3)">${esc(t.name.substring(0,ganttZoom<=2?20:10))}</div>`;if(li)cc2+=`<div style="position:absolute;right:3px;top:-8px;font-size:9px;color:${endD<today?'var(--alta)':'var(--muted)'};z-index:3">${endD<today?'⚠':'📍'}</div>`;}h+=`<td style="${cs2}height:38px">${cc2}</td>`;});
      h+=`</tr>`;
    });
  });
  h+=`</tbody></table></div></div>`;
  h+=`<div class="g-legend">`;groups.forEach(g=>{h+=`<div class="g-legend-item"><div class="g-legend-dot" style="background:${g.color}"></div>${esc(g.label)}</div>`;});h+=`</div>`;
  el.innerHTML=h;
}

        </div>
        <div style="display:flex;align-items:center;gap:6px">
          <span style="font-size:10px;color:var(--muted)">${pd}/${person.routines.length}</span>
          <button class="iBtn" onclick="delPerson(${pi})" title="Eliminar">🗑</button>
        </div>
      </div>
      <div class="rut-body">`;

    FREQ_ORDER.forEach(freq=>{
      const items=person.routines.filter(r=>r.freq===freq);
      if(!items.length)return;
      h+=`<div class="rut-freq-label" style="color:${person.color}">${freq==='Diaria'?'⏱ Diaria':freq==='Semanal'?'📆 Semanal':'🗓 Mensual'}</div>`;
      items.forEach(r=>{
        const ri=person.routines.indexOf(r);
        h+=`<div class="rut-item">
          <div class="rut-cb${r.done?' checked':''}" onclick="toggleRut(${pi},${ri})">
            <svg width="9" height="9" viewBox="0 0 9 9" fill="none"><path d="M1.5 4.5L3.5 6.5L7.5 2.5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
          <span class="rut-label${r.done?' done':''} editable-name" ondblclick="inlineEditRutName(${pi},${ri},this)">${esc(r.name)}</span>
          ${r.day?`<span class="rut-day-tag">${esc(r.day)}</span>`:''}
          <button class="rut-del" onclick="delRutine(${pi},${ri})">🗑</button>
        </div>`;
      });
    });

    h+=`<div class="add-rut-row">
      <input class="add-rut-inp" id="ri-${pi}" placeholder="Nueva rutina…" onkeydown="if(event.key==='Enter')addRutine(${pi})"/>
      <select class="add-rut-freq" id="rf-${pi}"><option>Diaria</option><option>Semanal</option><option>Mensual</option></select>
    </div>
    <div style="display:flex;gap:5px;margin-top:5px">
      <input style="flex:1;padding:4px 6px;border-radius:6px;border:1.5px solid var(--border);font-size:11px;background:var(--surface);color:var(--text);outline:none" id="rd-${pi}" placeholder="Día (ej: Lunes / 5)"/>
      <button class="btn btn-ghost btn-sm" onclick="addRutine(${pi})" style="color:${person.color};border-color:${person.color}">+ Agregar</button>
    </div>
    </div></div>`;
  });

  h+=`<button class="add-person-card" onclick="openPersonModal()">+ Agregar persona</button>`;
  h+=`</div>`;
  h+=`<div style="font-size:10px;color:var(--muted);text-align:right;margin-top:10px">Verificado: ${new Date().toLocaleString('es-CL',{hour:'2-digit',minute:'2-digit',day:'numeric',month:'short'})}</div>`;
  document.getElementById('v-rut').innerHTML=h;
}

function toggleRut(pi,ri){
  const today=new Date(),ts=today.toISOString().split('T')[0];
  const ws=ts.slice(0,4)+'-W'+String(getWeekNum(today)).padStart(2,'0'),ms=ts.slice(0,7);
  const r=D.rutinas.people[pi].routines[ri];r.done=!r.done;
  if(r.done){if(r.freq==='Diaria')r.lastDone=ts;if(r.freq==='Semanal')r.lastDone=ws;if(r.freq==='Mensual')r.lastDone=ms;}
  else r.lastDone='';
  save();rRut();
}
function addRutine(pi){const n=document.getElementById('ri-'+pi).value.trim();if(!n)return;D.rutinas.people[pi].routines.push({id:uid(),name:n,freq:document.getElementById('rf-'+pi).value,day:document.getElementById('rd-'+pi).value.trim(),done:false,lastDone:''});save();rRut();}

function toggleCanal(key){
  const cur=localStorage.getItem(key);
  localStorage.setItem(key,cur==='0'?'1':'0');
  rTareasPorCanal();
}

function qaddCanal(inp,area){
  const v=inp.value.trim();if(!v)return;
  const id=uid();
  D.tasks.push({id,name:v,estado:'Pendiente',urgencia:'Media',projectId:'',area:area,responsable:'',blockerType:'',blockerNote:'',notes:'',driveLink:'',frecuencia:'Puntual',deadline:'',revisor:'',revTags:[]});
  if(!D.taskOrder)D.taskOrder=[];
  D.taskOrder.unshift(id);
  save();rTareasPorCanal();
}

function addCanalPrompt(){
  const name=prompt('Nombre del nuevo canal:','');
  if(!name||!name.trim())return;
  const n=name.trim();
  if(!D.canales)D.canales=DEFAULT_CANALES.map(c=>({...c}));
  if(D.canales.find(c=>c.key===n)){alert('Ya existe un canal con ese nombre.');return;}
  const ICONS=['🌟','📦','🎯','💡','🔧','📋','🌐','✨'];
  const COLORS=['#6366f1','#ec4899','#14b8a6','#f59e0b','#8b5cf6','#10b981','#ef4444','#06b6d4'];
  const idx=D.canales.length%ICONS.length;
  D.canales.push({key:n,icon:ICONS[idx],color:COLORS[idx]});
  save();rTareasPorCanal();
}

function deleteCanal(key){
  if(!confirm(`¿Eliminar el canal "${key}"? Las tareas asignadas a este canal quedarán sin canal.`))return;
  if(!D.canales)return;
  D.canales=D.canales.filter(c=>c.key!==key);
  save();rTareasPorCanal();
}

function linkOrphanComercial(){
  // One-time migration: create linked tasks for existing comercial entries without taskId
  let dirty=false;
  if(!D.comercial)D.comercial=[];
  if(!D.tasks)D.tasks=[];
  D.comercial.forEach(c=>{
    if(!c.taskId){
      dirty=true;
      const taskId=uid();
      const taskName=`🛒 ${c.nombre||'Pedido'}${c.producto?' — '+c.producto:''}`;
      const taskEstado=c.estado==='Listo'||c.estado==='Cancelado'?'Completado':c.estado==='En proceso'?'En progreso':'Pendiente';
      D.tasks.push({id:taskId,name:taskName,projectId:'',area:'Comercial',urgencia:c.urgencia||'Media',estado:taskEstado,startDate:'',deadline:c.fecha_entrega||'',responsable:c.quien_pide||'',blockerType:'',blockerNote:'',notes:c.notas||'',driveLink:'',frecuencia:'Puntual',_fromComercial:true});
      c.taskId=taskId;
    }
  });
  return dirty;
}

    if(remote){
      D=remote;
      const _prevLen=(D.budget&&D.budget.expenses)?D.budget.expenses.length:0;
      applyRemoteMigrations();
      const _needsSave=linkOrphanComercial()||(D.budget.expenses.length>_prevLen);
      if(_needsSave)save();
    } else {
      // Primera vez — subir datos locales a Firebase
      _fbRef.set(D);
    }
  } else {
    if(remote){D=remote;applyRemoteMigrations();}
  }
  render();
  const dot=document.getElementById('sync-dot');
  if(dot){dot.textContent='🟢 Sincronizado';dot.style.color='var(--baja)';}
