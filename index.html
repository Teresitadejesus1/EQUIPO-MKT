<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dashboard · Viga Home</title>
<style>
:root{
  color-scheme:light;
  --bg:#f4f5f9;--surface:#fff;--border:#e2e5ee;--text:#1a1d2e;--muted:#7a7f9a;
  --accent:#4361ee;--alta:#e63946;--alta-bg:#fde8ea;--media:#e07b39;--media-bg:#fef0e4;
  --baja:#2a9d8f;--baja-bg:#e0f5f3;--done-c:#9ea8b8;--done-bg:#f1f3f5;
  --rev:#7209b7;--rev-bg:#f3e8ff;
  --dis:#f72585;--dis-bg:#ffe8f4;
  --cnt:#3a86ff;--cnt-bg:#e8f0ff;
  --pre:#059669;--pre-bg:#d1fae5;
  --gan:#b45309;--gan-bg:#fef3c7;
  --rut:#0f766e;--rut-bg:#ccfbf1;
  --pdq:#7c3aed;--pdq-bg:#ede9fe;
  --mat:#db2777;--mat-bg:#fce7f3;
  --com:#0369a1;--com-bg:#e0f2fe;
  --brand:#9333ea;--brand-bg:#f3e8ff;
  --shadow:0 2px 10px rgba(0,0,0,.07);--r:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;}

.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:200;}
.logo{font-size:17px;font-weight:800;color:var(--accent);letter-spacing:-.5px;}
.logo span{color:var(--muted);font-weight:400;font-size:12px;margin-left:5px;}
.hdr-right{margin-left:auto;display:flex;gap:7px;}

.btn{padding:6px 12px;border-radius:7px;border:none;cursor:pointer;font-size:12px;font-weight:600;transition:opacity .15s,transform .1s;}
.btn:hover{opacity:.85;}.btn:active{transform:scale(.97);}
.btn-primary{background:var(--accent);color:#fff;}
.btn-ghost{background:transparent;border:1.5px solid var(--border);color:var(--text);}
.btn-sm{padding:4px 9px;font-size:11px;}

.tabs{display:flex;gap:2px;padding:14px 20px 0;overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:7px 13px;border-radius:7px 7px 0 0;border:1px solid transparent;cursor:pointer;font-size:12px;font-weight:600;color:var(--muted);background:transparent;transition:all .15s;white-space:nowrap;flex-shrink:0;}
.tab.active{background:var(--surface);border-color:var(--border);border-bottom-color:var(--surface);color:var(--text);}
.tab:hover:not(.active){color:var(--text);}
.tab.t-rev.active{color:var(--rev);}
.tab.t-dis.active{color:var(--dis);}
.tab.t-cnt.active{color:var(--cnt);}
.tab.t-pre.active{color:var(--pre);}
.tab.t-gan.active{color:var(--gan);}
.tab.t-rut.active{color:var(--rut);}
.tab.t-pdq.active{color:var(--pdq);}
.tab.t-mat.active{color:var(--mat);}
.tab.t-com.active{color:var(--com);}
.tab.t-brand.active{color:var(--brand);}

/* Calendar view */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-hdr{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px;}
.cal-hdr-cell{text-align:center;font-size:10px;font-weight:700;color:var(--muted);padding:4px 0;}
.cal-day{min-height:80px;background:var(--surface);border:1.5px solid var(--border);border-radius:7px;padding:5px;position:relative;}
.cal-day.today{border-color:var(--accent);background:#f0f3ff;}
.cal-day.other-month{opacity:.4;}
.cal-day-num{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:3px;}
.cal-day.today .cal-day-num{color:var(--accent);}
.cal-pill{font-size:9px;font-weight:600;padding:2px 5px;border-radius:4px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;}
.cal-week-row{display:grid;grid-template-columns:50px repeat(7,1fr);gap:6px;margin-bottom:6px;}
.cal-week-col{background:var(--surface);border:1.5px solid var(--border);border-radius:7px;padding:6px;min-height:60px;}
.cal-week-col.today{border-color:var(--accent);background:#f0f3ff;}
.cal-week-day-hdr{font-size:10px;font-weight:700;color:var(--muted);margin-bottom:4px;text-align:center;}
.cal-week-col.today .cal-week-day-hdr{color:var(--accent);}
.view-toggle{display:flex;gap:4px;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:3px;}
.view-btn{padding:5px 12px;border-radius:5px;border:none;cursor:pointer;font-size:11px;font-weight:600;color:var(--muted);background:transparent;transition:all .15s;}
.view-btn.active{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.1);}

/* Filter chips */
.chip-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;align-items:center;}
.chip{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;border:1.5px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;transition:all .15s;}
.chip:hover{border-color:var(--accent);color:var(--accent);}
.chip.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.chip.chip-alta.active{background:var(--alta);border-color:var(--alta);}
.chip.chip-media.active{background:var(--media);border-color:var(--media);}
.chip.chip-baja.active{background:var(--baja);border-color:var(--baja);}

/* Done card */
.kcard-done{opacity:.65;}
.kcard-done:hover{opacity:1;}

/* Quick add row in kanban col */
.qadd-row{display:flex;gap:4px;margin-top:8px;border-top:1px solid var(--border);padding-top:8px;}
.qadd-inp{flex:1;border:1.5px dashed var(--border);border-radius:6px;padding:5px 8px;font-size:11px;background:transparent;color:var(--text);outline:none;}
.qadd-inp:focus{border-color:var(--accent);background:#fff;}

/* Kanban board */
.kboard{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;min-height:300px;}
.kcol-drop{background:var(--bg);border-radius:var(--r);padding:10px;border:2px dashed transparent;transition:border-color .2s,background .2s;}
.kcol-drop.dragover{border-color:var(--accent);background:#eef0fc;}
.kcol-drop.col-rev{background:#fdf4ff;}
.kcol-drop.col-rev.dragover{border-color:var(--rev);background:var(--rev-bg);}
.kcol-drop.col-done{background:#f0fdf4;}
.kct-wrap{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.kcard{background:var(--surface);border:1.5px solid var(--border);border-radius:7px;padding:8px 10px;margin-bottom:6px;cursor:grab;transition:box-shadow .15s;user-select:none;}
.kcard:hover{box-shadow:var(--shadow);}
.kcard.dragging{opacity:.4;}
.kcard-name{font-size:12px;font-weight:600;margin-bottom:4px;}
.kcard-tags{display:flex;gap:4px;flex-wrap:wrap;}
.kcard-resp{font-size:10px;color:var(--muted);margin-top:3px;}

/* Assigned tasks section in tabs */
.assigned-section{background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:14px;}
.assigned-hdr{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;display:flex;align-items:center;gap:6px;}

/* Comercial */
.com-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;display:flex;gap:10px;align-items:flex-start;}
.com-card:hover{box-shadow:var(--shadow);}
select.com-status{padding:3px 7px;border-radius:5px;font-size:10px;font-weight:700;border:1.5px solid var(--border);cursor:pointer;}

/* PDQ table */
.pdq-table{width:100%;border-collapse:collapse;margin-top:4px;}
.pdq-table th{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;padding:6px 8px;text-align:left;border-bottom:2px solid var(--border);}
.pdq-table td{font-size:12px;padding:7px 8px;border-bottom:1px solid var(--border);vertical-align:middle;}
.pdq-table tr:hover td{background:var(--bg);}
.pdq-estado{padding:2px 7px;border-radius:8px;font-size:10px;font-weight:700;cursor:pointer;border:none;}
.pdq-link{color:var(--pdq);text-decoration:none;font-size:11px;}
.pdq-link:hover{text-decoration:underline;}
.pdq-actions{display:flex;gap:2px;opacity:0;}
tr:hover .pdq-actions{opacity:1;}
/* Material cards */
.mat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;margin-top:4px;}
.mat-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:13px;display:flex;flex-direction:column;gap:6px;}
.mat-card:hover{box-shadow:var(--shadow);}
.mat-name{font-weight:700;font-size:13px;}
.mat-meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.mat-notes{font-size:10px;color:var(--muted);font-style:italic;}
select.mat-status{padding:3px 7px;border-radius:5px;font-size:10px;font-weight:700;border:1.5px solid var(--border);cursor:pointer;}

.main{/* padding handled by sidebar layout css */}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:0 var(--r) var(--r) var(--r);padding:18px;}

.fbar{display:flex;gap:8px;padding:0 0 14px;flex-wrap:wrap;align-items:center;border-bottom:1px solid var(--border);margin-bottom:14px;}
.fbar label{font-size:11px;color:var(--muted);font-weight:600;}
select.fsel{padding:4px 8px;border-radius:6px;border:1.5px solid var(--border);font-size:11px;background:var(--surface);color:var(--text);cursor:pointer;}
.fsep{width:1px;height:18px;background:var(--border);margin:0 2px;}

/* Task cards */
.tc{background:var(--surface);border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:7px;display:flex;gap:10px;align-items:flex-start;transition:box-shadow .15s;}
.tc:hover{box-shadow:var(--shadow);}
.tc.done{opacity:.5;}
.tc.blocked{border-left:3px solid var(--rev);}
.udot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.d-alta{background:var(--alta)}.d-media{background:var(--media)}.d-baja{background:var(--baja)}.d-done{background:var(--done-c)}
.tb{flex:1;min-width:0;}
.tname{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tmeta{display:flex;gap:6px;flex-wrap:wrap;margin-top:3px;align-items:center;}
.tag{padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;}
.tag-alta{background:var(--alta-bg);color:var(--alta);}
.tag-media{background:var(--media-bg);color:var(--media);}
.tag-baja{background:var(--baja-bg);color:var(--baja);}
.tag-done{background:var(--done-bg);color:var(--done-c);}
.tag-area{background:#eef0fc;color:var(--accent);}
.tag-proj{background:#f0f0f4;color:#555;}
.tag-rev{background:var(--rev-bg);color:var(--rev);}
.tdays{font-size:10px;font-weight:700;margin-left:auto;flex-shrink:0;}
.dov{color:var(--alta)}.dsoon{color:var(--media)}.dok{color:var(--baja)}.ddone{color:var(--done-c)}
.tact{display:flex;gap:2px;opacity:0;transition:opacity .15s;}
.tc:hover .tact{opacity:1;}
.iBtn{background:none;border:none;cursor:pointer;padding:3px 4px;border-radius:4px;color:var(--muted);font-size:13px;}
.iBtn:hover{background:var(--border);}
.tnotes{font-size:10px;color:var(--muted);margin-top:2px;font-style:italic;}

.sh{display:flex;align-items:center;gap:8px;margin-bottom:8px;margin-top:18px;}
.sh:first-child{margin-top:0;}
.sh-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
.badge{background:var(--border);color:var(--muted);padding:1px 7px;border-radius:10px;font-size:10px;font-weight:700;}
.badge.urg{background:var(--alta-bg);color:var(--alta);}

.sg{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px;}
.scard{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:14px;text-align:center;}
.scard .num{font-size:26px;font-weight:800;}.scard .lbl{font-size:10px;color:var(--muted);font-weight:600;margin-top:2px;}
.sr .num{color:var(--alta)}.so .num{color:var(--media)}.sg2 .num{color:var(--baja)}

/* Kanban */
.pblock{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);margin-bottom:14px;overflow:hidden;}
.phead{padding:11px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);cursor:pointer;}
.phead:hover{background:var(--bg);}
.phl{display:flex;align-items:center;gap:8px;}
.pcol{width:11px;height:11px;border-radius:3px;flex-shrink:0;}
.pn{font-weight:700;font-size:14px;}
.pmeta{font-size:11px;color:var(--muted);}
.phstat{display:flex;gap:6px;align-items:center;}
.pstat{font-size:10px;padding:2px 7px;border-radius:8px;}
.kcols{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:10px 14px;}
.kcol{background:var(--bg);border-radius:7px;padding:7px;}
.kct{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;}
.mcard{background:var(--surface);border:1px solid var(--border);border-radius:5px;padding:6px 8px;margin-bottom:5px;font-size:11px;}
.mcard-n{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mcard-m{display:flex;align-items:center;justify-content:space-between;margin-top:2px;}
.no-k{font-size:10px;color:var(--muted);text-align:center;padding:8px 0;font-style:italic;}
.collapse{display:none;}.collapse.open{display:block;}
.chev{transition:transform .2s;display:inline-block;font-size:10px;color:var(--muted);}
.chev.open{transform:rotate(90deg);}

/* Inline editable */
.editable-name{cursor:pointer;border-bottom:1px dashed transparent;transition:border-color .15s;}
.editable-name:hover{border-bottom-color:var(--muted);}
.editable-input{border:none;border-bottom:2px solid var(--accent);background:transparent;font-size:inherit;font-weight:inherit;font-family:inherit;color:inherit;outline:none;padding:0;min-width:60px;}

/* Section intro banners */
.intro-banner{border-radius:var(--r);padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.intro-banner p{font-size:12px;font-weight:600;}
.intro-banner span{font-weight:400;font-size:11px;}

/* Revisión (formerly José) */
.blocker-group{margin-bottom:16px;}
.blocker-type-hdr{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--rev-bg);border-radius:7px;margin-bottom:6px;}
.blocker-type-hdr span{font-size:11px;font-weight:700;color:var(--rev);}
.rev-card{background:var(--surface);border:1.5px solid #d8b4fe;border-radius:8px;padding:10px 12px;margin-bottom:6px;display:flex;gap:10px;align-items:flex-start;}
.rev-card.resolved{opacity:.45;}
.jc-body{flex:1;}
.jc-task{font-weight:600;font-size:13px;}
.jc-need{font-size:12px;color:var(--rev);margin-top:2px;}
.jc-meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;align-items:center;}
.resolve-btn{background:var(--rev-bg);border:1.5px solid #d8b4fe;border-radius:6px;padding:4px 10px;font-size:11px;font-weight:700;color:var(--rev);cursor:pointer;white-space:nowrap;}
.resolve-btn:hover{background:#d8b4fe;}

/* Diseño (formerly Vivi) */
.area-block{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);margin-bottom:12px;overflow:hidden;}
.area-hdr{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;}
.area-hdr:hover{background:var(--bg);}
.area-name{font-weight:700;font-size:14px;}
.area-body{padding:10px 14px 14px;border-top:1px solid var(--border);}
.piece{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);}
.piece:last-of-type{border-bottom:none;}
.piece-name{flex:1;font-size:12px;font-weight:600;}
.piece-fmt{font-size:10px;color:var(--muted);flex-shrink:0;width:100px;}
.piece-dl{font-size:10px;font-weight:700;flex-shrink:0;width:75px;}
select.pstatus{padding:3px 7px;border-radius:5px;font-size:10px;font-weight:700;border:1.5px solid var(--border);cursor:pointer;}
.ps-brief{color:#555;background:#f5f5f5;}
.ps-design{color:var(--cnt);background:var(--cnt-bg);}
.ps-revision{color:var(--media);background:var(--media-bg);}
.ps-aprobado{color:var(--baja);background:var(--baja-bg);}
.ps-entregado{color:var(--done-c);background:var(--done-bg);}
.piece-del{background:none;border:none;cursor:pointer;color:var(--muted);font-size:12px;padding:2px;border-radius:3px;opacity:0;}
.piece:hover .piece-del{opacity:1;}
.piece-del:hover{background:var(--border);}
.add-piece-row{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;}
.add-piece-inp{flex:1;min-width:100px;border:1.5px dashed var(--border);border-radius:6px;padding:5px 8px;font-size:11px;background:transparent;color:var(--text);outline:none;}
.add-piece-inp:focus{border-color:var(--dis);background:#fff0f9;}

/* Content */
.content-cols{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.content-col-block{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;}
.ccol-hdr{padding:9px 13px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:6px;}
.ccol-name{font-weight:700;font-size:13px;flex:1;}
.ccol-body{padding:8px 13px 12px;}
.ci{display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:1px solid var(--border);}
.ci:last-of-type{border-bottom:none;}
.ci-name{flex:1;font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ci-plat{font-size:10px;color:var(--muted);flex-shrink:0;width:65px;}
.ci-dl{font-size:10px;font-weight:700;flex-shrink:0;width:55px;}
select.cistatus{padding:2px 5px;border-radius:4px;font-size:10px;font-weight:700;border:1.5px solid var(--border);cursor:pointer;}
.ci-del{background:none;border:none;cursor:pointer;color:var(--muted);font-size:11px;padding:2px;border-radius:3px;opacity:0;}
.ci:hover .ci-del{opacity:1;}
.ci-del:hover{background:var(--border);}
.add-ci-form{background:var(--bg);border-radius:7px;padding:9px;margin-top:7px;display:none;}
.add-ci-form.open{display:block;}
.add-ci-form input,.add-ci-form select{width:100%;padding:5px 8px;border:1.5px solid var(--border);border-radius:5px;font-size:11px;background:var(--surface);color:var(--text);margin-bottom:5px;outline:none;}
.add-ci-form input:focus,.add-ci-form select:focus{border-color:var(--cnt);}
.add-ci-toggle{background:none;border:1.5px dashed var(--border);width:100%;padding:5px;border-radius:6px;font-size:11px;color:var(--muted);cursor:pointer;margin-top:4px;}
.add-ci-toggle:hover{border-color:var(--cnt);color:var(--cnt);}
.add-type-btn{background:none;border:1.5px dashed var(--border);border-radius:var(--r);padding:16px;display:flex;align-items:center;justify-content:center;gap:6px;cursor:pointer;font-size:12px;color:var(--muted);}
.add-type-btn:hover{border-color:var(--cnt);color:var(--cnt);}

/* Presupuesto */
.presup-header{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
.presup-total-card{background:var(--pre-bg);border:1.5px solid #6ee7b7;border-radius:var(--r);padding:16px 18px;}
.presup-total-card h3{font-size:11px;font-weight:700;color:var(--pre);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
.budget-edit{padding:5px 9px;border:1.5px solid #6ee7b7;border-radius:6px;font-size:14px;font-weight:700;background:#fff;color:var(--pre);width:100%;outline:none;margin-bottom:8px;}
.budget-edit:focus{border-color:var(--pre);}
.progress-wrap{background:#d1fae5;border-radius:99px;height:10px;overflow:hidden;}
.progress-bar{height:10px;border-radius:99px;background:var(--pre);transition:width .4s;}
.progress-bar.over{background:var(--alta);}
.presup-meta{font-size:11px;color:var(--pre);margin-top:6px;font-weight:600;}
.presup-areas-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:16px 18px;}
.presup-areas-card h3{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;}
.area-budget-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.area-budget-row:last-child{margin-bottom:0;}
.abl{font-size:11px;font-weight:600;width:110px;flex-shrink:0;}
.area-prog-wrap{flex:1;background:var(--border);border-radius:99px;height:7px;overflow:hidden;}
.area-prog-bar{height:7px;border-radius:99px;transition:width .4s;}
.abamt{font-size:11px;font-weight:700;color:var(--muted);width:80px;text-align:right;flex-shrink:0;}
.exp-table{width:100%;border-collapse:collapse;margin-top:4px;}
.exp-table th{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;padding:6px 8px;text-align:left;border-bottom:2px solid var(--border);}
.exp-table td{font-size:12px;padding:7px 8px;border-bottom:1px solid var(--border);vertical-align:middle;}
.exp-table tr:hover td{background:var(--bg);}
.exp-amount{font-weight:700;color:var(--pre);}
.exp-actions{display:flex;gap:2px;opacity:0;}

.add-exp-form{background:var(--bg);border-radius:8px;padding:12px;margin-top:12px;display:none;}
.add-exp-form.open{display:block;}
.add-exp-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:8px;margin-bottom:8px;}

.fld{width:100%;padding:6px 9px;border:1.5px solid var(--border);border-radius:6px;font-size:12px;background:var(--surface);color:var(--text);outline:none;}
.fld:focus{border-color:var(--pre);}
.fld label{display:block;font-size:10px;font-weight:700;color:var(--muted);margin-bottom:3px;}

/* Gantt */
.gantt-container{overflow-x:auto;border:1px solid var(--border);border-radius:8px;}
.gantt-table{border-collapse:collapse;min-width:100%;}
.g-label-col{width:220px;min-width:220px;position:sticky;left:0;background:var(--surface);z-index:10;}
.g-label-head{padding:8px 12px;background:var(--bg);border-bottom:2px solid var(--border);border-right:2px solid var(--border);font-size:11px;font-weight:700;color:var(--muted);}
.g-label-cell{padding:6px 10px;border-bottom:1px solid var(--border);border-right:2px solid var(--border);background:var(--surface);}
.g-task-label{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:205px;}
.g-proj-label{font-size:9px;color:var(--muted);}

.g-proj-row td{background:#f7f8fc;}
.g-proj-row .g-label-cell{background:#f7f8fc;}
.g-proj-name{font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
.gantt-empty{text-align:center;padding:30px;font-size:12px;color:var(--muted);}
.g-legend{display:flex;gap:12px;flex-wrap:wrap;margin-top:10px;}
.g-legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted);}
.g-legend-dot{width:12px;height:12px;border-radius:3px;}

/* Rutinas */
.rut-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px;}
.rut-person{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;}
.rut-person-hdr{padding:11px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.rut-body{padding:10px 14px 14px;}
.rut-freq-label{font-size:9px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;padding:8px 0 4px;color:var(--muted);}
.rut-item{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);}
.rut-item:last-of-type{border-bottom:none;}
.rut-cb{width:15px;height:15px;border-radius:4px;border:2px solid var(--border);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.rut-cb.checked{border-color:var(--rut);background:var(--rut);}
.rut-label{flex:1;font-size:12px;font-weight:500;transition:color .15s;}
.rut-label.done{color:var(--done-c);text-decoration:line-through;}
.rut-day-tag{font-size:9px;font-weight:700;color:var(--muted);background:var(--border);padding:1px 5px;border-radius:4px;flex-shrink:0;}
.rut-del{background:none;border:none;cursor:pointer;color:var(--muted);font-size:11px;padding:2px 3px;border-radius:3px;opacity:0;}
.rut-item:hover .rut-del{opacity:1;}
.rut-del:hover{background:var(--border);}
.add-rut-row{display:flex;gap:5px;margin-top:8px;border-top:1px solid var(--border);padding-top:8px;}
.add-rut-inp{flex:1;border:1.5px dashed var(--border);border-radius:6px;padding:4px 7px;font-size:11px;background:transparent;color:var(--text);outline:none;}
.add-rut-inp:focus{border-color:var(--rut);background:#f0fdfb;}
select.add-rut-freq{padding:4px 6px;border-radius:6px;border:1.5px solid var(--border);font-size:11px;background:var(--surface);cursor:pointer;}
.add-person-card{background:none;border:1.5px dashed var(--border);border-radius:var(--r);padding:20px;display:flex;align-items:center;justify-content:center;gap:6px;cursor:pointer;font-size:12px;color:var(--muted);}
.add-person-card:hover{border-color:var(--rut);color:var(--rut);}

/* Empty / Overlay / Modal */
.empty{text-align:center;padding:32px 20px;color:var(--muted);}
.empty-icon{font-size:30px;margin-bottom:8px;}
.empty p{font-size:12px;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;z-index:999;}
.modal{background:var(--surface);border-radius:12px;padding:22px;width:480px;max-width:96vw;max-height:90vh;overflow-y:auto;box-shadow:0 16px 48px rgba(0,0,0,.18);}
.modal h2{font-size:15px;font-weight:700;margin-bottom:15px;}
.fg{margin-bottom:12px;}
.fg label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:4px;}
.fc{width:100%;padding:7px 10px;border:1.5px solid var(--border);border-radius:7px;font-size:12px;background:var(--surface);color:var(--text);outline:none;}
.fc:focus{border-color:var(--accent);}
textarea.fc{resize:vertical;min-height:50px;}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.mact{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;}
.swatches{display:flex;gap:7px;flex-wrap:wrap;}
.sw{width:24px;height:24px;border-radius:4px;cursor:pointer;border:2.5px solid transparent;}
.sw.sel{border-color:var(--text);}

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function aKey(a){return a.replace(/ /g,'_');}
function cKey(t){return t.replace(/ \//g,'').replace(/ /g,'_');}
function fmt$(n){return'$'+Number(n||0).toLocaleString('es-CL');}
function getWeekNum(d){const oj=new Date(d.getFullYear(),0,1);return Math.ceil((((d-oj)/86400000)+oj.getDay()+1)/7);}
function daysLeft(dl){if(!dl)return null;const t=new Date();t.setHours(0,0,0,0);const d=new Date(dl);d.setHours(0,0,0,0);return Math.round((d-t)/86400000);}
function dlabel(dl,estado){
  if(estado==='Completado')return{cls:'ddone',txt:'✓'};
  const d=daysLeft(dl);
  if(d===null)return{cls:'dok',txt:'Sin fecha'};
  if(d<0)return{cls:'dov',txt:`Venc.${Math.abs(d)}d`};
  if(d===0)return{cls:'dov',txt:'⚠ Hoy'};
  if(d<=3)return{cls:'dsoon',txt:`${d}d`};
  return{cls:'dok',txt:`${d}d`};
}

function quickEditTaskName(id,el){
  const t=D.tasks.find(x=>x.id===id);if(!t)return;
  const inp=document.createElement('input');
  inp.value=t.name;inp.style.cssText='width:100%;border:1.5px solid var(--accent);border-radius:5px;padding:2px 6px;font-size:13px;font-weight:600;background:var(--surface);color:var(--text);outline:none;';
  el.replaceWith(inp);inp.focus();inp.select();
  function done(){t.name=inp.value.trim()||t.name;save();rHoy();}
  inp.addEventListener('blur',done);
  inp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();inp.blur();}if(e.key==='Escape'){inp.value=t.name;inp.blur();}});
}
function rHoy(){
  const now=new Date();
  const today=now.toISOString().slice(0,10);
  const DAYS_ES=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const MONTHS_ES=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  const greeting=now.getHours()<12?'Buenos días':'now.getHours()<19?\'Buenas tardes\':\' Buenas noches\'';
  const greet=now.getHours()<12?'Buenos días':now.getHours()<19?'Buenas tardes':'Buenas noches';
  const dateStr=`${DAYS_ES[now.getDay()]} ${now.getDate()} de ${MONTHS_ES[now.getMonth()]}`;

  const allTasks=D.tasks||[];
  const pending=allTasks.filter(t=>t.estado!=='Completado');
  const overdue=pending.filter(t=>t.deadline&&t.deadline<today);

  // Week tasks (next 7 days including today)
  const d7=new Date(now);d7.setDate(d7.getDate()+7);
  const weekEnd=d7.toISOString().slice(0,10);
  const weekTasks=pending.filter(t=>t.deadline&&t.deadline>=today&&t.deadline<=weekEnd)
    .sort((a,b)=>a.deadline.localeCompare(b.deadline));

  // Canal summary
  const canales=(D.canales||[{key:'PDV',icon:'🏪',color:'#059669'},{key:'Equipo Comercial',icon:'🛒',color:'#0369a1'},{key:'Ecommerce',icon:'💻',color:'#3b82f6'},{key:'Activaciones',icon:'🚀',color:'#9333ea'}]);

  // Budget
  const annual=(D.budget&&D.budget.annual)||0;
  const spent=(D.budget&&D.budget.expenses)?D.budget.expenses.filter(e=>!e.recurrence||e.recurrence==='puntual').reduce((s,e)=>s+Number(e.amount||0),0):0;
  const spentPct=annual>0?Math.min(spent/annual*100,100):0;

  const urgColor={Alta:'#e63946',Media:'#f4a261',Baja:'#2a9d8f'};

  let h=`<style>
  .hoy-greeting{margin-bottom:20px;}
  .hoy-greeting h1{font-size:22px;font-weight:800;color:var(--text);margin-bottom:2px;}
  .hoy-greeting p{font-size:13px;color:var(--muted);}
  .canal-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
  .canal-card{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:16px;border-top:4px solid var(--cc);cursor:pointer;transition:box-shadow .15s;}
  .canal-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.1);}
  .canal-card-icon{font-size:22px;margin-bottom:8px;}
  .canal-card-name{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px;}
  .canal-card-count{font-size:28px;font-weight:800;color:var(--text);line-height:1;}
  .canal-card-sub{font-size:11px;margin-top:4px;}
  .hoy-two{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px;}
  .hoy-card{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:16px;}
  .hoy-card-title{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:12px;}
  .week-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);}
  .week-row:last-child{border-bottom:none;}
  .week-day{font-size:10px;font-weight:700;color:var(--muted);min-width:28px;text-align:center;background:var(--bg);border-radius:5px;padding:2px 4px;}
  .week-day.today{background:#4361ee;color:#fff;}
  .week-name{flex:1;font-size:12px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;}
  .week-name:hover{color:#4361ee;}
  .week-urg{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
  .week-resp{font-size:10px;color:var(--muted);flex-shrink:0;}
  .bud-bar-bg{height:8px;background:var(--bg);border-radius:99px;overflow:hidden;margin:8px 0;}
  .bud-bar-fill{height:100%;border-radius:99px;background:#059669;transition:width .4s;}
  .overdue-pill{display:inline-flex;align-items:center;gap:5px;background:#fef2f2;border:1.5px solid #fca5a5;border-radius:8px;padding:8px 12px;font-size:12px;color:#991b1b;cursor:pointer;margin-bottom:16px;width:100%;}
  .overdue-pill:hover{background:#fee2e2;}
  </style>`;

  // Greeting
  h+=`<div class="hoy-greeting">
    <h1>${greet}, Tere 👋</h1>
    <p>${dateStr}${overdue.length>0?` · <span style="color:var(--alta);font-weight:600">${overdue.length} tarea${overdue.length!==1?'s':''} atrasada${overdue.length!==1?'s':''}</span>`:' · Todo al día ✅'}</p>
  </div>`;

  // Overdue alert pill
  if(overdue.length>0){
    h+=`<div class="overdue-pill" onclick="sw('tareas')">
      🚨 <strong>${overdue.length} tarea${overdue.length!==1?'s':''} vencida${overdue.length!==1?'s':''} sin completar</strong>
      <span style="margin-left:auto;opacity:.6;font-size:11px">Ver en Tareas →</span>
    </div>`;
  }

  // Canal cards
  h+=`<div class="canal-grid">`;
  canales.slice(0,4).forEach(c=>{
    const cTasks=pending.filter(t=>(t.area||'')===c.key);
    const cOver=cTasks.filter(t=>t.deadline&&t.deadline<today);
    h+=`<div class="canal-card" style="--cc:${c.color}" onclick="sw('tareas')">
      <div class="canal-card-icon">${c.icon}</div>
      <div class="canal-card-name">${esc(c.key)}</div>
      <div class="canal-card-count">${cTasks.length}</div>
      <div class="canal-card-sub" style="color:${cOver.length>0?'var(--alta)':'var(--muted)'}">
        ${cOver.length>0?`⚠ ${cOver.length} atrasada${cOver.length!==1?'s':''}`:cTasks.length===0?'Al día ✓':'pendiente'+( cTasks.length!==1?'s':'')}
      </div>
    </div>`;
  });
  h+=`</div>`;

  // Two columns: Esta semana + Presupuesto
  h+=`<div class="hoy-two">`;

  // Esta semana
  h+=`<div class="hoy-card">
    <div class="hoy-card-title">📅 Esta semana</div>`;
  if(weekTasks.length===0){
    h+=`<div style="text-align:center;padding:20px 0;color:var(--muted);font-size:13px">Sin tareas programadas esta semana</div>`;
  } else {
    weekTasks.slice(0,8).forEach(t=>{
      const d=new Date(t.deadline+'T12:00');
      const isToday=t.deadline===today;
      const dayLabel=isToday?'Hoy':DAYS_ES[d.getDay()].slice(0,3);
      h+=`<div class="week-row">
        <span class="week-day${isToday?' today':''}">${dayLabel}</span>
        <span class="week-urg" style="background:${urgColor[t.urgencia]||'#94a3b8'}"></span>
        <span class="week-name" onclick="openTask('${t.id}')" title="${esc(t.name)}">${esc(t.name)}</span>
        ${t.responsable?`<span class="week-resp">${esc(t.responsable)}</span>`:''}
      </div>`;
    });
    if(weekTasks.length>8)h+=`<div style="font-size:11px;color:var(--muted);text-align:center;padding-top:8px;cursor:pointer" onclick="sw('tareas')">+${weekTasks.length-8} más →</div>`;
  }
  // quick add
  h+=`<div style="display:flex;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">
    <input id="qadd-hoy" class="fc" placeholder="+ Agregar tarea rápida…" style="flex:1;font-size:12px;padding:6px 10px" onkeydown="if(event.key==='Enter')qaddHoy()"/>
    <button class="btn btn-primary btn-sm" onclick="qaddHoy()" style="font-size:12px">+</button>
  </div>`;
  h+=`</div>`;

  // Presupuesto card
  const monthNames=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const curM=now.getMonth();
  const monthlyFixed=(D.budget&&D.budget.expenses)?D.budget.expenses.filter(e=>e.recurrence==='mensual').reduce((s,e)=>s+Number(e.amount||0),0):0;
  h+=`<div class="hoy-card">
    <div class="hoy-card-title">💰 Presupuesto ${now.getFullYear()}</div>
    <div style="display:flex;justify-content:space-between;margin-bottom:6px">
      <span style="font-size:11px;color:var(--muted)">Gastado YTD</span>
      <span style="font-size:11px;font-weight:700">${fmt$(spent)}</span>
    </div>
    <div class="bud-bar-bg"><div class="bud-bar-fill" style="width:${spentPct.toFixed(1)}%;background:${spentPct>80?'var(--alta)':spentPct>60?'var(--media)':'#059669'}"></div></div>
    <div style="display:flex;justify-content:space-between;margin-bottom:14px">
      <span style="font-size:11px;color:var(--muted)">${spentPct.toFixed(0)}% del presupuesto</span>
      <span style="font-size:11px;color:var(--muted)">${annual>0?fmt$(annual):'-'} total</span>
    </div>
    ${monthlyFixed>0?`<div style="background:#eff6ff;border-radius:8px;padding:10px 12px;margin-bottom:10px">
      <div style="font-size:10px;font-weight:700;color:#1e40af;text-transform:uppercase;margin-bottom:3px">Fijo mensual</div>
      <div style="font-size:16px;font-weight:800;color:#1d4ed8">${fmt$(monthlyFixed)}</div>
      <div style="font-size:10px;color:#3b82f6">comprometido cada mes</div>
    </div>`:''}
    <button class="btn btn-ghost btn-sm" onclick="sw('pre')" style="width:100%;font-size:11px">Ver Presupuesto completo →</button>
  </div>`;

  h+=`</div>`;

  document.getElementById('v-hoy').innerHTML=h;
}
// ─── PENDIENTES (KANBAN) ─────────────────────────────────────────────────────
let _dragId=null;
let kFilter={area:'',resp:'',urg:'',hoy:false};
let showDone=false;
function setKF(key,val){
  if(key==='hoy') kFilter.hoy=!kFilter.hoy;
  else kFilter[key]=kFilter[key]===val?'':val;
  rPendientes();
}
function clearKF(){kFilter={area:'',resp:'',urg:'',hoy:false};rPendientes();}

function archiveDone(){
  if(!confirm('¿Eliminar todas las tareas completadas?'))return;
  D.tasks=D.tasks.filter(t=>t.estado!=='Completado');
  D.comercial.forEach(c=>{if(c.taskId&&!D.tasks.find(t=>t.id===c.taskId))delete c.taskId;});
  showDone=false;save();render();
}

function qaddHoy(){
  const n=document.getElementById('qadd-hoy')?.value.trim();
  if(!n)return;
  const today=new Date().toISOString().slice(0,10);
  D.tasks.push({id:uid(),name:n,estado:'Pendiente',urgencia:'Media',projectId:'',area:'',responsable:'',blockerType:'',blockerNote:'',notes:'',driveLink:'',frecuencia:'Puntual',deadline:today});
  document.getElementById('qadd-hoy').value='';
  save();render();
}
function qaddTask(estado,inputId){
  const n=document.getElementById(inputId)?.value.trim();
  if(!n)return;
  D.tasks.push({id:uid(),name:n,estado,urgencia:'Media',projectId:'',area:'',responsable:'',blockerType:'',blockerNote:'',notes:'',driveLink:''});
  document.getElementById(inputId).value='';
  save();render();
}

function dragTask(e,id){_dragId=id;e.dataTransfer.effectAllowed='move';document.getElementById('kc-'+id)?.classList.add('dragging');}
function dragEnd(e,id){document.getElementById('kc-'+id)?.classList.remove('dragging');}
function dragOver(e,col){e.preventDefault();document.querySelectorAll('.kcol-drop').forEach(c=>c.classList.remove('dragover'));document.getElementById('kdrop-'+col)?.classList.add('dragover');}
function dragLeave(){document.querySelectorAll('.kcol-drop').forEach(c=>c.classList.remove('dragover'));}
function dropTask(e,newEstado){
  e.preventDefault();document.querySelectorAll('.kcol-drop').forEach(c=>c.classList.remove('dragover'));
  if(!_dragId)return;
  const t=D.tasks.find(x=>x.id===_dragId);if(!t)return;
  t.estado=newEstado==='Necesita revisión'?'En progreso':newEstado;
  if(newEstado==='Necesita revisión'){if(!t.blockerType)t.blockerType='Revisión pendiente';}
  else{t.blockerType='';t.blockerNote='';}
  _dragId=null;save();render();
}

function rPendientes(){
  let base=applyKF(applyF(D.tasks));

  const sortTasks=arr=>arr.sort((a,b)=>{
    const ud=urgOrd(a.urgencia)-urgOrd(b.urgencia);
    if(ud!==0)return ud;
    if(a.deadline&&b.deadline)return a.deadline.localeCompare(b.deadline);
    if(a.deadline)return-1;if(b.deadline)return 1;
    return 0;
  });
  const allDone=base.filter(t=>t.estado==='Completado');
  const cols=[
    {id:'Pendiente',         label:'📋 Pendiente',          cls:'',         tasks:sortTasks(base.filter(t=>t.estado==='Pendiente'&&!t.blockerType))},
    {id:'En progreso',       label:'🔄 En proceso',          cls:'',         tasks:sortTasks(base.filter(t=>t.estado==='En progreso'&&!t.blockerType))},
    {id:'Necesita revisión', label:'🔒 Necesita revisión',   cls:'col-rev',  tasks:sortTasks(base.filter(t=>t.blockerType&&t.estado!=='Completado'))},
    {id:'Completado',        label:'✅ Completado',           cls:'col-done', tasks:showDone?allDone:[]}
  ];

  function kcard(t){
    const pr=D.projects.find(p=>p.id===t.projectId);
    const dl=dlabel(t.deadline,t.estado);
    const uc=t.urgencia.toLowerCase();
    const done=t.estado==='Completado';
    return`<div class="kcard${done?' kcard-done':''}" id="kc-${t.id}" draggable="true"
      ondragstart="dragTask(event,'${t.id}')" ondragend="dragEnd(event,'${t.id}')">
      <div style="display:flex;align-items:flex-start;gap:7px">
        <input type="checkbox" ${done?'checked':''} style="margin-top:3px;width:14px;height:14px;accent-color:var(--baja);cursor:pointer;flex-shrink:0"
          onclick="event.stopPropagation();checkDone('${t.id}',this.checked)"/>
        <div style="flex:1;min-width:0">
          <div class="kcard-name" style="${done?'text-decoration:line-through;color:var(--muted)':''}">${esc(t.name)}</div>
          <div class="kcard-tags">
            <span class="tag tag-${uc}" style="font-size:9px">${t.urgencia}</span>
            ${t.area?`<span class="tag tag-area" style="font-size:9px">${esc(t.area)}</span>`:''}
            ${pr?`<span class="tag tag-proj" style="font-size:9px">${esc(pr.name)}</span>`:''}
            ${t.deadline?`<span class="tdays ${dl.cls}" style="font-size:9px">${dl.txt}</span>`:''}
            ${t.frecuencia&&t.frecuencia!=='Puntual'?`<span style="font-size:9px;color:var(--muted)">🔁 ${esc(t.frecuencia)}</span>`:''}
          </div>
          ${t.responsable?`<div class="kcard-resp">👤 ${esc(t.responsable)}</div>`:''}
          ${t.blockerType?`<div style="font-size:9px;color:var(--rev);margin-top:2px">🔒 ${esc(t.blockerType)}</div>`:''}
        </div>
      </div>
      <div style="display:flex;gap:3px;margin-top:5px;opacity:0;transition:opacity .15s" class="kcard-act">
        <button class="iBtn" style="font-size:11px" onclick="editTask('${t.id}')">✏️</button>
        <button class="iBtn" style="font-size:11px" onclick="cycleS('${t.id}')">🔄</button>
        <button class="iBtn" style="font-size:11px" onclick="delTask('${t.id}')">🗑</button>
      </div>
    </div>`;
  }

  // build chip row
  const areas=[...new Set(D.tasks.filter(t=>t.area).map(t=>t.area))];
  const resps=[...new Set(D.tasks.filter(t=>t.responsable).map(t=>t.responsable))];
  const anyActive=kFilter.hoy||kFilter.urg||kFilter.area||kFilter.resp;
  let chipH=`<div class="chip-row">
    <span class="chip${kFilter.hoy?' active':''}" onclick="setKF('hoy',true)">📅 Hoy</span>
    <span class="chip chip-alta${kFilter.urg==='Alta'?' active':''}" onclick="setKF('urg','Alta')">🔴 Alta</span>
    <span class="chip chip-media${kFilter.urg==='Media'?' active':''}" onclick="setKF('urg','Media')">🟡 Media</span>
    <span class="chip chip-baja${kFilter.urg==='Baja'?' active':''}" onclick="setKF('urg','Baja')">🟢 Baja</span>`;
  areas.forEach(a=>{ chipH+=`<span class="chip${kFilter.area===a?' active':''}" onclick="setKF('area','${a.replace(/'/g,"\\'")}')">📁 ${esc(a)}</span>`; });
  resps.forEach(r=>{ chipH+=`<span class="chip${kFilter.resp===r?' active':''}" onclick="setKF('resp','${r.replace(/'/g,"\\'")}')">👤 ${esc(r)}</span>`; });
  if(anyActive) chipH+=`<span class="chip" onclick="clearKF()" style="color:var(--alta);border-color:var(--alta)">✕ Limpiar filtros</span>`;
  chipH+=`</div>`;

  let h=chipH+`<div class="kboard">`;
  cols.forEach(col=>{
    const colKey=col.id.replace(/ /g,'-');
    h+=`<div class="kcol-drop ${col.cls}" id="kdrop-${colKey}"
      ondragover="dragOver(event,'${colKey}')"
      ondragleave="dragLeave()"
      ondrop="dropTask(event,'${col.id}')">
      <div class="kct-wrap">
        <span class="kct">${col.label}</span>
        <span class="badge">${col.id==='Completado'?allDone.length:col.tasks.length}</span>
        ${col.id==='Completado'?`<button class="btn btn-ghost btn-sm" style="font-size:10px;padding:3px 7px;margin-left:4px" onclick="showDone=!showDone;rPendientes()">${showDone?'Ocultar':'Ver '+allDone.length}</button>`:''}
      </div>
      ${col.id==='Completado'&&showDone&&allDone.length>0?`<button class="btn btn-ghost btn-sm" style="width:100%;margin-bottom:6px;font-size:10px;color:var(--muted)" onclick="archiveDone()">🗂 Archivar todas las completadas</button>`:''}
      ${col.tasks.length?col.tasks.map(kcard).join(''):`<div class="no-k">${col.id==='Completado'?(showDone?'Sin completadas':'—'):'Arrastra aquí'}</div>`}
      ${col.id!=='Necesita revisión'&&col.id!=='Completado'?`<div class="qadd-row"><input class="qadd-inp" id="qadd-${colKey}" placeholder="+ Tarea rápida… (Enter para guardar)" onkeydown="if(event.key==='Enter'){event.preventDefault();qaddTask('${col.id}','qadd-${colKey}');}"/></div>`:''}
    </div>`;
  });
  h+=`</div>`;
  h+=`<style>.kcard:hover .kcard-act{opacity:1!important}</style>`;

  // wrap with view toggle header

// Lista drag-and-drop (Pendientes tab)
let _listaDragId=null;
function listaDragStart(e,id){_listaDragId=id;e.currentTarget.classList.add('dragging');e.dataTransfer.effectAllowed='move';}
function listaDragEnd(e){e.currentTarget.classList.remove('dragging');document.querySelectorAll('.lista-row').forEach(r=>r.classList.remove('drag-over'));}
function listaDragOver(e){e.preventDefault();e.dataTransfer.dropEffect='move';e.currentTarget.classList.add('drag-over');}
function listaDrop(e,targetId){
  e.preventDefault();
  document.querySelectorAll('.lista-row').forEach(r=>r.classList.remove('drag-over'));
  if(!_listaDragId||_listaDragId===targetId)return;
  if(!D.taskOrder)D.taskOrder=[];
  // build current active order
  const active=D.tasks.filter(t=>t.estado!=='Completado');
  const ordered=[...D.taskOrder.map(id=>active.find(t=>t.id===id)).filter(Boolean),...active.filter(t=>!D.taskOrder.includes(t.id))];
  const ids=ordered.map(t=>t.id);
  const fromIdx=ids.indexOf(_listaDragId);
  const toIdx=ids.indexOf(targetId);
  if(fromIdx<0||toIdx<0)return;
  ids.splice(fromIdx,1);
  ids.splice(toIdx,0,_listaDragId);
  D.taskOrder=ids;
  _listaDragId=null;
  save();
  rListaView();
}

function toggleDoneTask(id){
  const t=D.tasks.find(x=>x.id===id);
  if(!t)return;
  t.estado=t.estado==='Completado'?'Pendiente':'Completado';
  if(t.estado==='Completado'&&t._fromComercial){const c=D.comercial?.find(x=>x.taskId===id);if(c)c.estado='Listo';}
  save();rPendientes();
}
function listaQuickAdd(){
  const v=document.getElementById('lista-qadd')?.value.trim();
  if(!v)return;
  const id=uid();
  D.tasks.push({id,name:v,estado:'Pendiente',urgencia:'Media',projectId:'',area:'',responsable:'',blockerType:'',blockerNote:'',notes:'',driveLink:'',frecuencia:'Puntual',deadline:'',revisor:'',revTags:[]});
  if(!D.taskOrder)D.taskOrder=[];
  D.taskOrder.unshift(id); // add to top
  save();rPendientes();
}

function applyKF(tasks){
  let b=tasks;
  if(kFilter.hoy){const today=new Date().toISOString().split('T')[0];b=b.filter(t=>t.deadline===today);}
  if(kFilter.urg)b=b.filter(t=>t.urgencia===kFilter.urg);
  if(kFilter.area)b=b.filter(t=>t.area===kFilter.area);
  if(kFilter.resp)b=b.filter(t=>(t.responsable||'').toLowerCase().includes(kFilter.resp.toLowerCase()));
  return b;
}
function rCalWeek(){
  const base=applyKF(applyF(D.tasks));
  const today=new Date();today.setHours(0,0,0,0);
  const dow=today.getDay()===0?6:today.getDay()-1; // Monday=0
  const weekStart=new Date(today);weekStart.setDate(today.getDate()-dow+calOffset*7);

  const days=['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
  const URGCOLOR={'Alta':'#ef4444','Media':'#f59e0b','Baja':'#10b981','':'#6366f1'};

  let h=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
    <button class="btn btn-ghost btn-sm" onclick="calOffset--;rPendientes()">← Anterior</button>
    <strong style="font-size:12px">${calOffset===0?'Esta semana':'Semana del '+weekStart.toLocaleDateString('es-CL',{day:'numeric',month:'short'})}</strong>
    <button class="btn btn-ghost btn-sm" onclick="calOffset++;rPendientes()">Siguiente →</button>
    ${calOffset!==0?`<button class="btn btn-ghost btn-sm" onclick="calOffset=0;rPendientes()">Hoy</button>`:''}
  </div>
  <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:6px">`;

  for(let di=0;di<7;di++){
    const d=new Date(weekStart);d.setDate(weekStart.getDate()+di);
    const ds=d.toISOString().split('T')[0];
    const isToday=d.toDateString()===today.toDateString();
    const dayTasks=base.filter(t=>t.deadline===ds);
    h+=`<div style="background:var(--surface);border:1.5px solid ${isToday?'var(--accent)':'var(--border)'};border-radius:10px;padding:8px;min-height:110px">
      <div style="font-size:10px;font-weight:700;color:${isToday?'var(--accent)':'var(--muted)'};margin-bottom:5px">${days[di]} ${d.getDate()}</div>
      ${dayTasks.map(t=>{
        const uc=t.estado==='Completado'?'done':t.urgencia.toLowerCase();
        const col=URGCOLOR[t.urgencia]||'#6366f1';
        return`<div class="cal-pill" style="background:${col}18;color:${col};border:1px solid ${col}40;${t.estado==='Completado'?'text-decoration:line-through;opacity:.5':''}"
          onclick="editTask('${t.id}')" title="${esc(t.name)}">
          <input type="checkbox" ${t.estado==='Completado'?'checked':''} style="width:10px;height:10px;accent-color:${col};vertical-align:middle;margin-right:2px"
            onclick="event.stopPropagation();checkDone('${t.id}',this.checked)"/>
          ${esc(t.name.length>18?t.name.substring(0,18)+'…':t.name)}
        </div>`;
      }).join('')}
      ${!dayTasks.length?`<div style="font-size:9px;color:var(--border);text-align:center;margin-top:8px">—</div>`:''}
    </div>`;
  }
  h+=`</div>`;

  // tasks without deadline
  const noDate=base.filter(t=>!t.deadline&&t.estado!=='Completado');
  if(noDate.length){
    h+=`<div style="margin-top:14px"><div style="font-size:11px;font-weight:700;color:var(--muted);margin-bottom:6px">Sin fecha (${noDate.length})</div>
    <div style="display:flex;flex-wrap:wrap;gap:5px">
      ${noDate.map(t=>`<div class="cal-pill" style="background:var(--bg);border:1.5px solid var(--border);color:var(--muted);cursor:pointer" onclick="editTask('${t.id}')">${esc(t.name)}</div>`).join('')}
    </div></div>`;
  }

  const el=document.getElementById('v-urgente');
  el.innerHTML=el.innerHTML+h;
}

function rCalMonth(){
  const base=applyKF(applyF(D.tasks));
  const today=new Date();today.setHours(0,0,0,0);
  const viewDate=new Date(today.getFullYear(),today.getMonth()+calOffset,1);
  const y=viewDate.getFullYear(),m=viewDate.getMonth();
  const firstDay=new Date(y,m,1);
  const lastDay=new Date(y,m+1,0);
  const startDow=firstDay.getDay()===0?6:firstDay.getDay()-1;

  const MONTHS_ES2=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const URGCOLOR={'Alta':'#ef4444','Media':'#f59e0b','Baja':'#10b981','':'#6366f1'};
  const days=['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];

  let h=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
    <button class="btn btn-ghost btn-sm" onclick="calOffset--;rPendientes()">← Anterior</button>
    <strong style="font-size:13px">${MONTHS_ES2[m]} ${y}</strong>
    <button class="btn btn-ghost btn-sm" onclick="calOffset++;rPendientes()">Siguiente →</button>
    ${calOffset!==0?`<button class="btn btn-ghost btn-sm" onclick="calOffset=0;rPendientes()">Hoy</button>`:''}
  </div>
  <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:3px">
    ${days.map(d=>`<div style="text-align:center;font-size:10px;font-weight:700;color:var(--muted);padding:4px 0">${d}</div>`).join('')}
  </div>
  <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px">`;

  // leading blank days
  for(let i=0;i<startDow;i++) h+=`<div style="min-height:70px"></div>`;

  for(let day=1;day<=lastDay.getDate();day++){
    const d=new Date(y,m,day);
    const ds=d.toISOString().split('T')[0];
    const isToday=d.toDateString()===today.toDateString();
    const dayTasks=base.filter(t=>t.deadline===ds);
    const isSun=d.getDay()===0||d.getDay()===6;
    h+=`<div style="min-height:70px;background:${isToday?'#eef0ff':isSun?'#fafafa':'var(--surface)'};border:1.5px solid ${isToday?'var(--accent)':'var(--border)'};border-radius:7px;padding:5px;position:relative;">
      <div style="font-size:10px;font-weight:${isToday?800:600};color:${isToday?'var(--accent)':'var(--muted)'};margin-bottom:3px">${day}</div>
      ${dayTasks.slice(0,3).map(t=>{
        const col=t.estado==='Completado'?'#aaa':URGCOLOR[t.urgencia]||'#6366f1';
        return`<div style="font-size:9px;font-weight:600;padding:2px 4px;border-radius:3px;margin-bottom:2px;background:${col}18;color:${col};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;${t.estado==='Completado'?'text-decoration:line-through;':''}"
          onclick="editTask('${t.id}')" title="${esc(t.name)}">${esc(t.name)}</div>`;
      }).join('')}
      ${dayTasks.length>3?`<div style="font-size:9px;color:var(--muted);margin-top:1px">+${dayTasks.length-3} más</div>`:''}
    </div>`;
  }
  h+=`</div>`;

  // legend
  const totalWithDate=base.filter(t=>t.deadline).length;
  h+=`<div style="margin-top:10px;font-size:10px;color:var(--muted)">${totalWithDate} tarea${totalWithDate!==1?'s':''} con fecha en este calendario · Haz clic en cualquier tarea para editar</div>`;

  const el=document.getElementById('v-urgente');
  el.innerHTML=el.innerHTML+h;
}

  if(_calMode==='dia'){const d=new Date(_calD+'T12:00');d.setDate(d.getDate()+dir);_calD=d.toISOString().slice(0,10);}
  else if(_calMode==='semana'){const d=new Date(_calD+'T12:00');d.setDate(d.getDate()+dir*7);_calD=d.toISOString().slice(0,10);}
  else if(_calMode==='mes'){_calM+=dir;if(_calM>11){_calM=0;_calY++;}else if(_calM<0){_calM=11;_calY--;}}
  else if(_calMode==='anio'){_calY+=dir;}
  rCal();
}
function calSetMode(m){_calMode=m;rCal();}
function calGoToday(){const n=new Date();_calY=n.getFullYear();_calM=n.getMonth();_calD=n.toISOString().slice(0,10);rCal();}
function calGoDay(d){_calD=d;const p=d.split('-');_calY=+p[0];_calM=+p[1]-1;_calMode='dia';rCal();}

function getCalEvents(){
  const events={};
  function add(date,ev){if(!events[date])events[date]=[];events[date].push(ev);}
  // Tasks
  (D.tasks||[]).filter(t=>t.deadline&&t.estado!=='Completado').forEach(t=>{
    const cc=(D.canales||[]).find(c=>c.key===t.area);
    add(t.deadline,{type:'task',label:t.name,color:cc?cc.color:'#4361ee',icon:cc?cc.icon:'✅',urgencia:t.urgencia,id:t.id,responsable:t.responsable});
  });
  // PDQ from budget expenses
  if(D.budget&&D.budget.expenses){
    D.budget.expenses.forEach(e=>{
      if(e.date&&((e.category||'').toLowerCase().includes('pdq')||(e.name||'').toLowerCase().includes('pdq'))){
        add(e.date,{type:'pdq',label:e.name,color:'#7c3aed',icon:'🗂',amount:e.amount});
      }
    });
  }
  // PDQ array if exists
  if(D.pdq&&Array.isArray(D.pdq)){
    D.pdq.forEach(p=>{
      const d=p.fechaEntrega||p.fecha||p.date;
      if(d)add(d,{type:'pdq',label:p.nombre||p.name||'Pedido PDQ',color:'#7c3aed',icon:'🗂'});
    });
  }
  return events;
}

  if(_calMode==='mes'){

function rPrio(){
  const wrap=document.getElementById('v-prio');
  if(!wrap)return;
  const today=new Date().toISOString().slice(0,10);
  const DAYS_ES=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const MONTHS_S=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  const urgColor={Alta:'#e63946',Media:'#f4a261',Baja:'#2a9d8f'};
  const estColor={'Pendiente':'#94a3b8','En progreso':'#3b82f6','Bloqueado':'#e63946','Completado':'#22c55e'};
  const RESP_C={Tere:'#4361ee',Vivi:'#f72585',Simona:'#3a86ff'};

  const active=(D.tasks||[]).filter(t=>t.estado!=='Completado');
  const ordered=[...(D.taskOrder||[]).map(id=>active.find(t=>t.id===id)).filter(Boolean),...active.filter(t=>!(D.taskOrder||[]).includes(t.id))];
  const canalMap={};(D.canales||[]).forEach(c=>{canalMap[c.key]={icon:c.icon,color:c.color};});

  // Build columns from unique responsables
  const allResps=[...new Set(ordered.map(t=>t.responsable||'__none__'))];
  allResps.sort((a,b)=>{
    const pri={Tere:0,Vivi:1,Simona:2};
    const pa=pri[a]??( a==='__none__'?99:3);
    const pb=pri[b]??( b==='__none__'?99:3);
    if(pa!==pb)return pa-pb;return a.localeCompare(b);
  });

  function dayLabel(ds){
    if(!ds)return null;
    const d=new Date(ds+'T12:00');
    const tmr=new Date();tmr.setDate(tmr.getDate()+1);
    if(ds===today)return{txt:'HOY',cls:'day-today'};
    if(ds===tmr.toISOString().slice(0,10))return{txt:'Mañana',cls:'day-tmr'};
    if(ds<today)return{txt:`${DAYS_ES[d.getDay()]} ${d.getDate()}/${d.getMonth()+1}`,cls:'day-over'};
    return{txt:`${DAYS_ES[d.getDay()]} ${d.getDate()} ${MONTHS_S[d.getMonth()]}`,cls:'day-ok'};
  }

  function taskCard(t,idx){
    const dl=t.deadline?dayLabel(t.deadline):null;
    const cc=canalMap[t.area||''];
    const isOver=t.deadline&&t.deadline<today;
    return`<div class="pc-card${isOver?' pc-overdue':''}" id="pc-${t.id}" draggable="true"
      ondragstart="prioDragStart(event,'${t.id}')"
      ondragover="prioDragOver(event)"
      ondrop="prioDrop(event,'${t.id}')"
      ondragend="prioDragEnd(event)">
      <div class="pc-card-top">
        <span class="pc-handle">⠿</span>
        <span class="pc-dot" style="background:${urgColor[t.urgencia]||'#94a3b8'}" title="${t.urgencia||'Media'}"></span>

// ─── KANBAN / CAMPAÑAS ───────────────────────────────────────────────────────
let _campFilter='all';
function setCampFilter(f){_campFilter=f;rKanban();}

function addEntregable(projId){
  const inp=document.getElementById('ent-inp-'+projId);
  if(!inp||!inp.value.trim())return;
  const p=D.projects.find(x=>x.id===projId);
  if(!p)return;
  if(!p.entregables)p.entregables=[];
  p.entregables.push({id:uid(),nombre:inp.value.trim(),responsable:'',done:false});
  inp.value='';
  save();rKanban();
}
function delEntregable(projId,entId){
  const p=D.projects.find(x=>x.id===projId);
  if(!p||!p.entregables)return;
  p.entregables=p.entregables.filter(e=>e.id!==entId);
  save();rKanban();
}
function togEntregable(projId,entId,checked){
  const p=D.projects.find(x=>x.id===projId);
  if(!p||!p.entregables)return;
  const e=p.entregables.find(x=>x.id===entId);
  if(e){e.done=checked;save();rKanban();}
}

function rKanban(){
  const today=new Date().toISOString().slice(0,10);
  const STATUS_LABELS={planning:'Planning',preparacion:'En preparación',activa:'Activa',terminada:'Terminada'};
  const STATUS_COLORS={planning:'#9ea8b8',preparacion:'#f59e0b',activa:'#22c55e',terminada:'#6366f1'};

  let projs=D.projects||[];
  if(_campFilter!=='all')projs=projs.filter(p=>(p.status||'planning')===_campFilter);

  function daysLeftCamp(d){
    if(!d)return null;
    return Math.round((new Date(d)-new Date(today))/86400000);
  }

  function entregablesList(proj){
    const ents=proj.entregables||[];
    const doneE=ents.filter(e=>e.done).length;
    const pct=ents.length>0?Math.round(doneE/ents.length*100):0;
    let h=`<div class="ent-progress">
      <div class="ent-bar-wrap"><div class="ent-bar-fill" style="width:${pct}%;background:${proj.color||'#4361ee'}"></div></div>
      <span class="ent-pct">${doneE}/${ents.length} entregables</span>
    </div>`;
    ents.forEach(e=>{
      h+=`<div class="ent-row">
        <input type="checkbox" ${e.done?'checked':''} onchange="togEntregable('${proj.id}','${e.id}',this.checked)">
        <span class="ent-name ${e.done?'ent-done':''}">${esc(e.nombre)}</span>
        ${e.responsable?`<span class="ent-resp">${esc(e.responsable)}</span>`:''}
        <button class="btn-xs" onclick="delEntregable('${proj.id}','${e.id}')">✕</button>
      </div>`;
    });
    h+=`<div class="ent-add-row">
      <input class="ent-input" id="ent-inp-${proj.id}" placeholder="+ Agregar entregable…" onkeydown="if(event.key==='Enter')addEntregable('${proj.id}')">
      <button class="btn-xs" onclick="addEntregable('${proj.id}')">Agregar</button>
    </div>`;
    return h;
  }

  const cards=projs.map(p=>{
    const tasks=(D.tasks||[]).filter(t=>t.projectId===p.id);
    const done=tasks.filter(t=>t.estado==='Completado').length;
    const overdueCount=tasks.filter(t=>t.estado!=='Completado'&&t.deadline&&t.deadline<today).length;
    const blockedCount=tasks.filter(t=>t.blockerType).length;
    const dl=daysLeftCamp(p.endDate);
    const color=p.color||'#4361ee';
    const status=p.status||'planning';
    const statusColor=STATUS_COLORS[status]||'#9ea8b8';
    const statusLabel=STATUS_LABELS[status]||status;

    return`<div class="camp-card">
      <div class="camp-card-hdr">
        <span class="camp-dot" style="background:${color};width:12px;height:12px"></span>
        <span class="camp-card-name">${esc(p.name)}</span>
        <span class="camp-status-badge" style="background:${statusColor}20;color:${statusColor}">${statusLabel}</span>
        ${p.area?`<span class="camp-area">${esc(p.area)}</span>`:''}
        <span style="flex:1"></span>
        ${p.endDate?`<span class="camp-dates">${p.endDate}</span>`:''}
        ${dl!==null?`<span class="camp-dl ${dl<0?'camp-dl-red':dl<7?'camp-dl-orange':''}">${dl<0?Math.abs(dl)+'d atrás':dl===0?'Vence hoy':dl+'d'}</span>`:''}
        <button class="btn-xs" onclick="editProj('${p.id}')">✏️</button>
        <button class="btn-xs" onclick="openTaskModal(null,'${p.id}')">+ Tarea</button>
      </div>
      ${overdueCount>0?`<div style="color:#e63946;font-size:11px;margin:4px 0">⚠️ ${overdueCount} tarea(s) atrasada(s)</div>`:''}
      ${blockedCount>0?`<div style="color:#7209b7;font-size:11px;margin:4px 0">🚧 ${blockedCount} bloqueada(s)</div>`:''}
      <div class="camp-card-body" id="campbody-${p.id}">
        ${entregablesList(p)}
        <div style="margin-top:10px;border-top:1px solid #f1f5f9;padding-top:10px">
          <div style="font-size:11px;font-weight:600;color:#64748b;margin-bottom:6px">TAREAS (${done}/${tasks.length})</div>
          ${tasks.slice(0,5).map(t=>`<div class="ent-row">
            <span class="ent-name ${t.estado==='Completado'?'ent-done':''}">${esc(t.name)}</span>
            ${t.urgencia?`<span class="urg-mini urg-${t.urgencia.toLowerCase()}">${t.urgencia}</span>`:''}
            ${t.deadline?`<span class="rev-date">${t.deadline}</span>`:''}
          </div>`).join('')}
          ${tasks.length>5?`<div style="font-size:11px;color:#9ea8b8">+${tasks.length-5} más…</div>`:''}
        </div>
      </div>
    </div>`;
  }).join('');

  const filterBar=`<div class="camp-filters">
    <button class="camp-filter ${_campFilter==='all'?'active':''}" data-status="all" onclick="setCampFilter('all')">Todas</button>
    <button class="camp-filter ${_campFilter==='activa'?'active':''}" data-status="activa" onclick="setCampFilter('activa')">Activas</button>
    <button class="camp-filter ${_campFilter==='preparacion'?'active':''}" data-status="preparacion" onclick="setCampFilter('preparacion')">En preparación</button>
    <button class="camp-filter ${_campFilter==='planning'?'active':''}" data-status="planning" onclick="setCampFilter('planning')">Planning</button>
    <button class="camp-filter ${_campFilter==='terminada'?'active':''}" data-status="terminada" onclick="setCampFilter('terminada')">Terminadas</button>
    <button class="btn btn-primary btn-sm" onclick="openProjModal()">+ Nueva campaña</button>
  </div>`;

  document.getElementById('v-kanban').innerHTML=filterBar+`<div class="camp-grid">${cards||'<div style="color:#9ea8b8;padding:20px">Sin campañas. Crea una nueva.</div>'}</div>`;
}
function togP(id){document.getElementById('col-'+id).classList.toggle('open');document.getElementById('chev-'+id).classList.toggle('open');}

    ${['Alta','Media','Baja'].map(u=>`<span style="padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;background:${URGCOLOR[u]}18;color:${URGCOLOR[u]}">${active.filter(t=>t.urgencia===u).length} ${u}</span>`).join('')}
  </div>`;

  if(!active.length){h+=`<div class="empty"><div class="empty-icon">🏷</div><p>Sin tareas activas para Tere. Asigna responsable "Tere" al crear una tarea.</p></div>`;}

          <div class="udot d-${uc}" style="margin-top:6px;flex-shrink:0"></div>
          <div class="tb" style="flex:1">
            <div class="tname">${esc(t.name)}</div>
            <div class="tmeta">
              <span class="tag tag-${uc}">${t.urgencia}</span>
              ${pr?`<span class="tag tag-proj">${esc(pr.name)}</span>`:''}
              ${t.estado!=='Pendiente'?`<span class="tag" style="background:#e0f2fe;color:#0369a1">${esc(t.estado)}</span>`:''}
              ${t.deadline?`<span class="tdays ${dl.cls}">${dl.txt}</span>`:''}
              ${t.blockerType?`<span class="tag tag-rev">🔒 Revisión</span>`:''}
            </div>
            ${t.notes?`<div class="tnotes">${esc(t.notes)}</div>`:''}

// ─── REVISIÓN ────────────────────────────────────────────────────────────────
// ─── REVISIÓN filters state ───────────────────────────────────────────────────
let _revPerson='',_revTag='';
function setRevPerson(p){_revPerson=_revPerson===p?'':p;rRev();}
function setRevTag(t){_revTag=_revTag===t?'':t;rRev();}

// helper: CSS class for a review tag
function rtagClass(tag){
  const t=tag.toLowerCase();
  if(t.includes('aprobac'))return'rtag-aprobacion';
  if(t.includes('falta')||t.includes('info'))return'rtag-falta';
  if(t.includes('feedback'))return'rtag-feedback';
  if(t.includes('decis')||t.includes('urgente'))return'rtag-decision';
  if(t.includes('revisi'))return'rtag-revision';
  if(t.includes('presupuesto'))return'rtag-presupuesto';
  return'rtag-default';
}
function rtagBadge(tag){return`<span class="rtag ${rtagClass(tag)}">${esc(tag)}</span>`;}

function rRev(){
  const today=new Date().toISOString().slice(0,10);
  const in7=new Date();in7.setDate(in7.getDate()+7);const d7=in7.toISOString().slice(0,10);
  const in30=new Date();in30.setDate(in30.getDate()+30);const d30=in30.toISOString().slice(0,10);

  const RESP_COLORS={Tere:'#6366f1',Vivi:'#f72585',Simona:'#3a86ff',José:'#e07b39',Jose:'#e07b39'};
  const allPending=(D.tasks||[]).filter(t=>t.estado!=='Completado');

  // collect all reviewers across tasks
  const allRevisors=[...new Set(allPending.filter(t=>t.revisor).map(t=>t.revisor))];

  // apply filters
  let filtered=allPending;
  if(_revPerson) filtered=filtered.filter(t=>t.revisor&&t.revisor.toLowerCase()===_revPerson.toLowerCase());
  if(_revTag) filtered=filtered.filter(t=>(t.revTags||[]).includes(_revTag));

  // sections after filter
  const thisWeek=filtered.filter(t=>t.deadline&&t.deadline>=today&&t.deadline<=d7);
  const needsRev=filtered.filter(t=>t.blockerType);
  const thisMonth=filtered.filter(t=>t.deadline&&t.deadline>d7&&t.deadline<=d30);
  const withTags=filtered.filter(t=>(t.revTags||[]).length>0);
  const overdue=filtered.filter(t=>t.deadline&&t.deadline<today);

  function taskRow(t){
    const rColor=RESP_COLORS[t.responsable]||'#9ea8b8';
    const rvColor=RESP_COLORS[t.revisor]||'#e07b39';
    const stBadge=t.estado==='En progreso'?'badge-prog':t.estado==='Completado'?'badge-done':'badge-pend';
    const dl=t.deadline?dlabel(t.deadline,t.estado):{cls:'',txt:''};
    return`<div class="rev-row">
      ${t.responsable?`<span class="resp-chip" style="background:${rColor}20;color:${rColor}">${esc(t.responsable)}</span>`:''}
      <div style="flex:1;min-width:0">
        <div class="rev-name">${esc(t.name)}</div>
        <div style="display:flex;flex-wrap:wrap;gap:3px;margin-top:3px">
          ${t.revisor?`<span style="font-size:10px;font-weight:700;color:${rvColor};background:${rvColor}15;padding:1px 7px;border-radius:8px">👔 ${esc(t.revisor)}</span>`:''}
          ${(t.revTags||[]).map(rtagBadge).join('')}
          ${t.blockerType?`<span class="rtag rtag-revision">🔒 ${esc(t.blockerType)}</span>`:''}
        </div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0">
        <span class="${stBadge}">${esc(t.estado)}</span>
        ${t.deadline?`<span class="tdays ${dl.cls}" style="font-size:10px">${dl.txt}</span>`:''}
      </div>
      <button class="btn-xs" onclick="editTask('${t.id}')">✏️</button>
    </div>`;
  }

  function section(title,tasks,emptyMsg){
    if(!tasks.length&&_revPerson)return'';// hide empty sections when person filter active
    return`<div class="rev-section">
      <div class="rev-section-title">${title} <span class="rev-count">${tasks.length}</span></div>
      ${tasks.length?tasks.map(taskRow).join(''):`<div class="rev-empty">${emptyMsg}</div>`}
    </div>`;
  }

  // ── Filter bar ────────────────────────────────────────────────────────────
  const personColors={Tere:'#6366f1',Vivi:'#f72585',Content:'#3a86ff',José:'#e07b39',Jose:'#e07b39'};
  let filterBar=`<div class="rev-filter-bar">
    <span style="font-size:11px;font-weight:700;color:var(--muted);margin-right:4px">Ver para:</span>`;
  allRevisors.forEach(p=>{
    const c=personColors[p]||'#9ea8b8';
    const active=_revPerson.toLowerCase()===p.toLowerCase();
    filterBar+=`<button class="rev-person-chip${active?' active':''}" style="${active?`background:${c};`:`border-color:${c}30;color:${c};`}" onclick="setRevPerson('${p.replace(/'/g,"\\'")}')">👔 ${esc(p)} <span style="background:${active?'rgba(255,255,255,.3)':'rgba(0,0,0,.08)'};padding:1px 6px;border-radius:8px;font-size:10px">${allPending.filter(t=>t.revisor&&t.revisor.toLowerCase()===p.toLowerCase()).length}</span></button>`;
  });
  if(!allRevisors.length) filterBar+=`<span style="font-size:11px;color:var(--muted);font-style:italic">Asigna "Para revisión de" en las tareas para filtrar aquí</span>`;
  if(_revPerson||_revTag) filterBar+=`<button class="btn btn-ghost btn-sm" style="color:var(--alta);border-color:var(--alta)" onclick="_revPerson='';_revTag='';rRev()">✕ Limpiar</button>`;
  filterBar+=`</div>`;

  // ── Tag filter chips ──────────────────────────────────────────────────────
  const usedTags=[...new Set(allPending.flatMap(t=>t.revTags||[]))];
  let tagBar='';
  if(usedTags.length){
    tagBar=`<div class="rev-filter-bar" style="margin-top:-8px;margin-bottom:12px">
      <span style="font-size:11px;font-weight:700;color:var(--muted);margin-right:4px">Etiqueta:</span>`;
    usedTags.forEach(tag=>{
      const active=_revTag===tag;
      tagBar+=`<span class="rtag ${rtagClass(tag)}" style="cursor:pointer;${active?'outline:2px solid #334155;outline-offset:1px;':''}" onclick="setRevTag('${tag.replace(/'/g,"\\'")}'">${esc(tag)} · ${allPending.filter(t=>(t.revTags||[]).includes(tag)).length}</span>`;
    });
    tagBar+=`</div>`;
  }

  // ── Active person panel ───────────────────────────────────────────────────
  let personPanel='';
  if(_revPerson){
    const pTasks=filtered;
    const pColor=personColors[_revPerson]||'#9ea8b8';
    const pOverdue=pTasks.filter(t=>t.deadline&&t.deadline<today);
    const pUrgent=pTasks.filter(t=>t.urgencia==='Alta');
    personPanel=`<div class="rev-person-panel" style="border-left:4px solid ${pColor}">
      <div class="rev-person-panel-hdr">
        <span style="font-size:18px;font-weight:800;color:${pColor}">👔 ${esc(_revPerson)}</span>
        <span class="badge" style="background:${pColor}20;color:${pColor}">${pTasks.length} tareas</span>
        ${pOverdue.length?`<span class="badge" style="background:#fde8ea;color:#e63946">⚠️ ${pOverdue.length} atrasada${pOverdue.length>1?'s':''}</span>`:''}
        ${pUrgent.length?`<span class="badge" style="background:#fde8ea;color:#e63946">🔴 ${pUrgent.length} urgente${pUrgent.length>1?'s':''}</span>`:''}
      </div>
      ${pTasks.length?pTasks.map(taskRow).join(''):`<div class="rev-empty">Sin tareas pendientes para ${esc(_revPerson)}.</div>`}
    </div>`;
  }

  // ── Projects table ────────────────────────────────────────────────────────
  const projs=(D.projects||[]);
  let projRows=projs.map(p=>{
    const pts=(D.tasks||[]).filter(t=>t.projectId===p.id);
    const done=pts.filter(t=>t.estado==='Completado').length;
    const total=pts.length;
    const pct=total>0?Math.round(done/total*100):0;
    const color=p.color||'#4361ee';
    return`<tr>
      <td><span class="camp-dot" style="background:${color};display:inline-block"></span> ${esc(p.name)}</td>
      <td>${esc(p.area||'–')}</td>
      <td><div style="display:flex;align-items:center;gap:6px"><div style="flex:1;height:6px;background:#f1f5f9;border-radius:3px"><div style="width:${pct}%;height:6px;background:${color};border-radius:3px"></div></div><span style="font-size:11px;color:#64748b">${pct}%</span></div></td>
      <td>${esc(p.period||'–')}</td>
      <td>${done}/${total}</td>
      <td><button class="btn-xs" onclick="editProj('${p.id}')">✏️</button></td>
    </tr>`;
  }).join('');

  const html= filterBar + tagBar + personPanel + (!_revPerson?`
    <div class="rev-cols">
      <div class="rev-col">
        ${section('📅 Esta semana',thisWeek,'Sin tareas para esta semana')}
        ${section('🚧 Bloqueadas',needsRev,'Sin tareas bloqueadas')}
      </div>
      <div class="rev-col">
        ${overdue.length?section('🚨 Atrasadas',overdue,''):''}
        ${section('🏷 Con etiquetas',withTags,'Sin tareas etiquetadas')}
        ${section('📆 Este mes',thisMonth,'Sin tareas para este mes')}
      </div>
    </div>
    <div class="rev-table-wrap">
      <div class="hoy-section-title" style="margin-bottom:12px">📋 Estado campañas</div>
      <table class="rev-table">
        <thead><tr><th>Campaña</th><th>Área</th><th>Avance</th><th>Período</th><th>Tareas</th><th></th></tr></thead>
        <tbody>${projRows||'<tr><td colspan="6" style="text-align:center;color:#9ea8b8">Sin campañas</td></tr>'}</tbody>
      </table>
    </div>`:'');

  document.getElementById('v-rev').innerHTML=html;
}

function updComStat(idx,val){
  const c=D.comercial[idx];
  c.estado=val;
  // sync status to linked task
  if(c.taskId){
    const t=D.tasks.find(x=>x.id===c.taskId);
    if(t){
      t.estado=val==='Listo'||val==='Cancelado'?'Completado':val==='En proceso'?'En progreso':'Pendiente';
    }
  }
  save();render();
}
function delCom(idx){
  if(!confirm('¿Eliminar este pedido?'))return;
  const c=D.comercial[idx];
  if(c&&c.taskId)D.tasks=D.tasks.filter(t=>t.id!==c.taskId);
  D.comercial.splice(idx,1);
  save();render();
}
function openComModal(idx){
  editComId=idx!==undefined?idx:null;
  const c=idx!==undefined?D.comercial[idx]:{};
  document.getElementById('com-nom').value=c.nombre||'';
  document.getElementById('com-qui').value=c.quien_pide||'';
  document.getElementById('com-pro').value=c.producto||'';
  document.getElementById('com-can').value=c.cantidad||'';
  document.getElementById('com-fec').value=c.fecha_entrega||'';
  document.getElementById('com-urg').value=c.urgencia||'Media';
  document.getElementById('com-est').value=c.estado||'Pendiente';
  document.getElementById('com-not').value=c.notas||'';
  document.getElementById('m-com').style.display='flex';
  setTimeout(()=>document.getElementById('com-nom').focus(),50);
}
function saveCom(){
  const nom=document.getElementById('com-nom').value.trim();
  if(!nom){alert('El nombre es obligatorio.');return;}
  const obj={
    nombre:nom,
    quien_pide:document.getElementById('com-qui').value.trim(),
    producto:document.getElementById('com-pro').value.trim(),
    cantidad:document.getElementById('com-can').value,
    fecha_entrega:document.getElementById('com-fec').value,
    urgencia:document.getElementById('com-urg').value||'Media',
    estado:document.getElementById('com-est').value,
    notas:document.getElementById('com-not').value.trim()
  };
  const taskName=`🛒 ${nom}${obj.producto?' — '+obj.producto:''}`;
  const taskEstado=obj.estado==='Listo'||obj.estado==='Cancelado'?'Completado':obj.estado==='En proceso'?'En progreso':'Pendiente';

  if(editComId!==null&&editComId!==undefined){
    // Edit: update comercial + linked task
    Object.assign(D.comercial[editComId],obj);
    const c=D.comercial[editComId];
    if(c.taskId){
      const t=D.tasks.find(x=>x.id===c.taskId);
      if(t){t.name=taskName;t.responsable=obj.quien_pide||'';t.deadline=obj.fecha_entrega||'';t.urgencia=obj.urgencia;t.notes=obj.notas;t.estado=taskEstado;}
    } else {
      // No linked task yet — create one now
      const taskId=uid();
      D.tasks.push({id:taskId,name:taskName,projectId:'',area:'Comercial',urgencia:obj.urgencia,estado:taskEstado,startDate:'',deadline:obj.fecha_entrega||'',responsable:obj.quien_pide||'',blockerType:'',blockerNote:'',notes:obj.notas||'',driveLink:'',frecuencia:'Puntual',_fromComercial:true});
      D.comercial[editComId].taskId=taskId;
    }
  } else {
    // New pedido — create comercial entry + task
    const taskId=uid();
    D.tasks.push({id:taskId,name:taskName,projectId:'',area:'Comercial',urgencia:obj.urgencia,estado:taskEstado,startDate:'',deadline:obj.fecha_entrega||'',responsable:obj.quien_pide||'',blockerType:'',blockerNote:'',notes:obj.notas||'',driveLink:'',frecuencia:'Puntual',_fromComercial:true});
    D.comercial.push({id:uid(),...obj,taskId});
  }
  save();close1('m-com');render();
}

let editExpId=null;
const MESES=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
// Helper: how many months in curYear does a recurring expense cover up to curMonth (inclusive)
function expMonthsInYear(e,curYear,curMonth){
  const rec=e.recurrence||'puntual';
  if(rec==='puntual')return 1;
  const startDate=e.date?new Date(e.date+'T12:00'):new Date(curYear,0,1);
  const startYear=startDate.getFullYear();
  const startM=startDate.getMonth();
  // only count months in curYear up to curMonth
  let from=startYear<curYear?0:(startYear===curYear?startM:null);
  if(from===null)return 0; // starts after current year
  if(rec==='mensual')return curMonth-from+1;
  if(rec==='trimestral'){let n=0;for(let m=from;m<=curMonth;m++)if((m-from)%3===0)n++;return n;}
  if(rec==='anual')return(startYear<curYear||(startYear===curYear&&startM<=curMonth))?1:0;
  return 1;
}
// Get effective amount contribution for total-spent up to curMonth
function expTotalContrib(e,curYear,curMonth){
  return Number(e.amount||0)*expMonthsInYear(e,curYear,curMonth);
}
// Distribute expense into monthly bars
function expToMonthBars(e,curYear){
  const bars=Array(12).fill(0);
  const rec=e.recurrence||'puntual';
  const amt=Number(e.amount||0);
  if(rec==='puntual'){
    if(e.date){const d=new Date(e.date+'T12:00');if(d.getFullYear()===curYear)bars[d.getMonth()]+=amt;}
  } else {
    const startDate=e.date?new Date(e.date+'T12:00'):new Date(curYear,0,1);
    const startYear=startDate.getFullYear();
    const startM=startYear<curYear?0:(startYear===curYear?startDate.getMonth():12);
    if(rec==='mensual'){for(let m=startM;m<12;m++)bars[m]+=amt;}
    else if(rec==='trimestral'){for(let m=startM;m<12;m++)if((m-startM)%3===0)bars[m]+=amt;}
    else if(rec==='anual'){if(startM<12)bars[startM]+=amt;}
  }
  return bars;
}
function rPre(){
  const b=D.budget;
  const exps=b.expenses||[];
  const now=new Date();
  const curMonth=now.getMonth();
  const curYear=now.getFullYear();
  const annual=Number(b.annual||0);
  const monthlyBudget=annual>0?annual/12:0;

  const monthsPassed=curMonth+1;
  const monthsLeft=12-monthsPassed;

  // ── PDQs ──────────────────────────────────────────────────────────────────
  const pdqs=D.pdqs||[];
